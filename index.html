<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Grafana Partner Assessment Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Grafana design tokens (grafana.com) */
    --bg:#111217; --bg-grad:#181b1f; --bg-soft:#0b0c0e;
    --panel:#181b1f; --panel2:#202226; --panel3:#2a2d33;
    --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.15); --border-soft:rgba(255,255,255,.04);
    --text:#ccccdc; --text-strong:#ffffff; --muted:#9090a0; --muted-dim:#6c6c80;
    --orange:#f46800; --orange-2:#ff8629; --orange-dim:#3d1e07; --brand-tint:rgba(244,104,0,.12); --border-brand:rgba(244,104,0,.40);
    --pink:#f2495c; --purple:#9170db;
    --green:#73bf69; --yellow:#fade2a; --red:#f2495c; --blue:#5794f2; --teal:#37c2ba;
    --shadow:0 1px 2px rgba(0,0,0,.3);
    --shadow-lg:0 4px 20px -6px rgba(0,0,0,.5);
    --radius:8px;
    --font-sans:'Inter',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --font-display:'Inter',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --font-mono:'Roboto Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --brand-grad:linear-gradient(135deg,var(--orange) 0%,var(--pink) 120%);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:var(--font-sans);
    background:
      radial-gradient(1200px 480px at 88% -20%, rgba(244,104,0,.06) 0%, rgba(244,104,0,0) 55%),
      var(--bg);
    background-attachment:fixed;color:var(--text);
    -webkit-font-smoothing:antialiased;line-height:1.5;}

  /* ---------- HEADER ---------- */
  header{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:14px;background:rgba(17,18,23,.85);backdrop-filter:blur(14px) saturate(1.2);
    position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo-chip{background:#f5f5f7;border-radius:6px;padding:7px 11px;display:inline-flex;align-items:center;flex:none;
    box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .logo{height:26px;width:auto;display:block;}
  header h1{font-family:var(--font-display);font-size:18px;margin:0;font-weight:700;letter-spacing:-.02em;color:var(--text-strong);}
  header .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .toolbtns{display:flex;gap:6px;}
  .iconbtn{background:var(--panel2);border:1px solid var(--border-strong);color:var(--muted);border-radius:6px;
    padding:7px 11px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;
    transition:.13s ease;}
  .iconbtn:hover{color:var(--text-strong);border-color:var(--border-brand);background:var(--panel3);}
  .iconbtn:active{background:var(--panel2);}
  #saveIndic{font-size:11px;color:var(--muted-dim);min-width:70px;text-align:right;transition:color .3s;}
  #saveIndic.flash{color:var(--green);}

  /* header mini gauge */
  .hscore{display:flex;align-items:center;gap:10px;}
  .hscore .ring{position:relative;width:46px;height:46px;flex:none;}
  .hscore .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;}
  .hscore .meta{text-align:right;}
  .hscore .meta .cat{font-size:12px;font-weight:600;font-family:var(--font-display);}
  .hscore .meta .verdict{font-size:11px;color:var(--muted);}
  .hscore .ring .num{font-family:var(--font-display);}

  /* ---------- NAV ---------- */
  nav{display:flex;gap:4px;padding:8px 20px 0;border-bottom:1px solid var(--border);overflow-x:auto;
    background:rgba(24,27,31,.85);backdrop-filter:blur(10px);position:sticky;top:63px;z-index:15;}
  nav button{background:none;border:none;color:var(--muted);padding:11px 15px 12px;font-size:13px;cursor:pointer;
    border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:8px;
    border-radius:8px 8px 0 0;transition:.15s ease;font-weight:500;}
  nav button.active{color:var(--orange);border-bottom-color:var(--orange);background:linear-gradient(180deg,rgba(244,104,0,.10),transparent);}
  nav button:hover{color:var(--text-strong);background:rgba(255,255,255,.03);}
  nav .step-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);font-size:9.5px;
    display:inline-flex;align-items:center;justify-content:center;color:var(--muted-dim);font-weight:700;transition:.15s;}
  nav button.active .step-dot{border-color:var(--orange);color:var(--orange);box-shadow:0 0 0 3px rgba(244,104,0,.12);}
  nav .step-dot.done{background:var(--green);border-color:var(--green);color:#062012;}

  main{max-width:1140px;margin:0 auto;padding:26px 20px 90px;}
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- CARDS ---------- */
  .card{position:relative;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card h2{margin:0 0 4px;font-family:var(--font-display);font-size:15px;color:var(--text-strong);font-weight:700;
    display:flex;align-items:center;gap:10px;letter-spacing:-.01em;}
  .card h2 .accent{width:3px;height:16px;border-radius:2px;background:var(--brand-grad);display:inline-block;}
  .card h3{margin:20px 0 10px;font-family:var(--font-mono);font-size:11px;color:var(--muted);border-top:1px solid var(--border-soft);
    padding-top:16px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
  .card h3:first-of-type{border-top:none;padding-top:2px;}
  .card .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px;line-height:1.55;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:760px){.grid,.grid3{grid-template-columns:1fr;}}

  label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.01em;}
  input[type=text],input[type=number],input[type=date],textarea,select{
    width:100%;background:var(--bg-soft);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:10px 12px;font-size:13px;font-family:inherit;transition:border-color .15s,box-shadow .15s,background .15s;
  }
  input::placeholder,textarea::placeholder{color:var(--muted-dim);}
  input:hover,textarea:hover,select:hover{border-color:var(--border-strong);}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--orange);background:var(--panel2);box-shadow:0 0 0 3px var(--brand-tint);}
  textarea{resize:vertical;min-height:58px;}
  .field{margin-bottom:14px;}
  .field.missing input,.field.missing textarea,.field.missing select{border-color:rgba(250,222,42,.35);background:rgba(250,222,42,.04);}
  .field .req-tag{color:var(--yellow);font-size:9.5px;margin-left:6px;text-transform:uppercase;letter-spacing:.06em;
    background:rgba(250,222,42,.14);padding:1px 6px;border-radius:4px;font-weight:600;vertical-align:middle;font-family:var(--font-mono);}

  .checkrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
  .checkrow:last-child{border-bottom:none;}
  .checkrow input{margin-top:3px;accent-color:var(--orange);}
  .checkrow .lbl{font-size:12.5px;}
  .checkrow .pts{color:var(--muted);font-size:11px;}

  /* checklist chips */
  .chks{display:flex;flex-wrap:wrap;gap:8px;}
  .chk{display:inline-flex;align-items:center;gap:7px;margin:0;font-size:12px;color:var(--text);cursor:pointer;
    background:var(--bg-soft);border:1px solid var(--border);border-radius:9999px;padding:7px 13px;transition:.14s;}
  .chk:hover{border-color:var(--border-strong);background:var(--panel2);}
  .chk.on{border-color:var(--border-brand);background:var(--brand-tint);color:var(--text-strong);}
  .chk input{accent-color:var(--orange);margin:0;}

  .criterion{border-bottom:1px solid var(--border-soft);padding:12px 0;}
  .criterion:last-child{border-bottom:none;}
  .criterion .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px;}
  .criterion .name{font-size:13px;}
  .criterion .max{font-size:11px;color:var(--muted);white-space:nowrap;}
  .criterion .pts-live{color:var(--orange);font-weight:700;font-family:var(--font-mono);}
  .criterion .max{font-family:var(--font-mono);}
  .levels{display:flex;gap:6px;flex-wrap:wrap;}
  .levels button{flex:1;min-width:120px;background:var(--bg-soft);border:1px solid var(--border);color:var(--muted);
    padding:9px;font-size:11.5px;border-radius:6px;cursor:pointer;text-align:center;font-family:inherit;transition:.14s ease;}
  .levels button:hover{border-color:var(--border-strong);color:var(--text);background:var(--panel2);}
  .levels button.sel{background:var(--brand-tint);border-color:var(--border-brand);color:var(--text-strong);font-weight:600;}
  .levels button.sel.lv-absent{background:rgba(242,73,92,.14);border-color:var(--red);}
  .levels button.sel.lv-declared{background:rgba(250,222,42,.14);border-color:var(--yellow);}
  .levels button.sel.lv-proven{background:rgba(115,191,105,.14);border-color:var(--green);}

  /* progress bar */
  .bar{height:7px;border-radius:4px;background:var(--bg-soft);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--orange),var(--orange-2));
    box-shadow:0 0 10px rgba(244,104,0,.4);transition:width .4s cubic-bezier(.4,0,.2,1);}

  .pillbar{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap;}
  .pill{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;flex:1;min-width:130px;transition:.15s;}
  .pill:hover{border-color:var(--border-strong);}
  .pill .val{font-size:24px;font-weight:700;font-family:var(--font-mono);letter-spacing:-.01em;}
  .pill .lab{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:500;font-family:var(--font-mono);}

  .btn{background:var(--orange);color:#fff;border:1px solid var(--orange);border-radius:6px;
    padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.13s ease;}
  .btn:hover{background:var(--orange-2);border-color:var(--orange-2);}
  .btn:active{background:#dc5e00;}
  .btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border-strong);}
  .btn.secondary:hover{background:var(--panel3);border-color:var(--panel3);color:var(--text-strong);}
  .btn.ghost{background:transparent;border:1px solid var(--border-strong);color:var(--muted);}
  .btn.ghost:hover{color:var(--text-strong);border-color:var(--muted);background:rgba(255,255,255,.03);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table th,table td{text-align:left;padding:10px 11px;border-bottom:1px solid var(--border-soft);vertical-align:top;}
  table th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-family:var(--font-mono);}
  table tbody tr{transition:background .12s;}
  table tbody tr:hover{background:rgba(255,255,255,.02);}
  table tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:2px 9px;border-radius:9999px;font-size:11px;font-weight:600;}
  .badge.crit{background:rgba(242,73,92,.14);color:var(--red);}
  .badge.high{background:rgba(244,166,56,.14);color:#f4a638;}
  .badge.med{background:rgba(250,222,42,.14);color:var(--yellow);}
  .badge.low{background:rgba(115,191,105,.14);color:var(--green);}

  .scorehero{display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .gauge{position:relative;width:150px;height:150px;flex:none;filter:drop-shadow(0 6px 18px rgba(0,0,0,.4));}
  .gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge .center .n{font-size:44px;font-weight:700;line-height:1;font-family:var(--font-display);letter-spacing:-.02em;}
  .gauge .center .d{font-size:13px;color:var(--muted);font-weight:600;font-family:var(--font-mono);}
  .catbadge{display:inline-block;padding:7px 17px;border-radius:20px;font-size:13px;font-weight:700;font-family:var(--font-display);
    box-shadow:0 4px 14px -4px rgba(0,0,0,.5);}

  .flag{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;background:var(--panel2);}
  .flag.crit{border-left:3px solid var(--red);}
  .flag.high{border-left:3px solid #f4a638;}
  .flag.med{border-left:3px solid var(--yellow);}
  .flag.low{border-left:3px solid var(--green);}
  .flag .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;}
  .flag .head .name{font-size:13px;font-weight:600;}
  .flag p{margin:5px 0;font-size:12.5px;color:var(--muted);}
  .flag p b{color:var(--text);font-weight:600;}

  .qbank{padding-left:20px;}
  .qbank li{margin-bottom:11px;font-size:13px;}
  .qbank.clean{list-style:none;padding-left:0;}
  .qbank.clean li{padding:10px 0;border-bottom:1px solid var(--border-soft);display:flex;gap:10px;}
  .qbank.clean li:before{content:"→";color:var(--orange);font-weight:700;}

  .planphase{margin-bottom:18px;}
  .planphase h4{margin:0 0 8px;font-size:13px;color:var(--orange);display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:600;}
  .planphase h4 .tag{background:var(--brand-tint);color:var(--orange-2);border-radius:6px;padding:3px 10px;font-size:11px;
    border:1px solid var(--border-brand);letter-spacing:.02em;font-family:var(--font-mono);}
  .plangrid{display:grid;grid-template-columns:2fr 1fr 1fr 2fr;gap:10px;font-size:12px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
  .plangrid.head{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;}
  @media(max-width:640px){.plangrid{grid-template-columns:1fr;gap:3px;padding:12px 0;}.plangrid.head{display:none;}}

  .empty{color:var(--muted);font-size:13px;padding:48px 20px;text-align:center;line-height:1.6;
    border:1px dashed var(--border-strong);border-radius:var(--radius);background:rgba(255,255,255,.01);}

  /* matrix */
  .matrix{position:relative;width:100%;height:440px;background:var(--panel2);
    border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;}
  .matrix .qlabel{position:absolute;font-size:11px;color:var(--muted-dim);padding:8px;max-width:45%;}
  .dot{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #0b0c0e;transform:translate(-50%,-50%);cursor:pointer;transition:.12s;}
  .dot:hover{transform:translate(-50%,-50%) scale(1.35);z-index:5;}
  .dot .dlabel{position:absolute;left:50%;top:-22px;transform:translateX(-50%);white-space:nowrap;font-size:10px;
    background:var(--panel3);border:1px solid var(--border);padding:2px 6px;border-radius:6px;color:var(--text);opacity:0;pointer-events:none;transition:.12s;}
  .dot:hover .dlabel{opacity:1;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .conf{font-size:12px;padding:3px 10px;border-radius:9999px;font-weight:600;}
  .conf.high{background:rgba(115,191,105,.14);color:var(--green);}
  .conf.mid{background:rgba(250,222,42,.14);color:var(--yellow);}
  .conf.low{background:rgba(242,73,92,.14);color:var(--red);}
  .exec p{font-size:13.5px;line-height:1.65;}

  .rangewrap{display:flex;align-items:center;gap:10px;}
  .rangewrap input[type=range]{flex:1;accent-color:var(--orange);}
  .rangewrap span{font-size:12px;color:var(--muted);min-width:60px;text-align:right;}

  .radar-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .legend{display:flex;flex-direction:column;gap:6px;font-size:12px;}
  .legend .row{display:flex;align-items:center;gap:8px;}
  .legend .sw{width:10px;height:10px;border-radius:3px;}

  .navbtns{display:flex;gap:8px;flex-wrap:wrap;}

  footer{text-align:center;color:var(--muted-dim);font-size:11px;padding:24px;}

  /* ---------- ACCESSIBILITY & POLISH ---------- */
  /* Visible keyboard focus on every interactive control (mouse clicks stay clean). */
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,
  [tabindex]:focus-visible,.chk:focus-within,label:focus-within{
    outline:2px solid var(--orange-2);outline-offset:2px;border-radius:8px;}
  .langsw button:focus-visible,nav button:focus-visible,.levels button:focus-visible{outline-offset:-2px;}

  /* subtle entrance when switching screens */
  @keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  #main.screen-in{animation:screenIn .26s cubic-bezier(.4,0,.2,1);}

  /* custom scrollbars (nav overflow, page) */
  nav::-webkit-scrollbar{height:0;}
  body::-webkit-scrollbar{width:11px;}
  body::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:8px;border:3px solid var(--bg);}
  body::-webkit-scrollbar-thumb:hover{background:#3a3d47;}
  *{scrollbar-width:thin;scrollbar-color:var(--panel3) transparent;}

  /* fix sticky header/nav overlap on narrow screens where the header wraps */
  @media(max-width:700px){
    header{position:relative;top:auto;}
    nav{position:relative;top:auto;}
  }

  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;
      transition-duration:.001ms !important;scroll-behavior:auto !important;}
    #main.screen-in{animation:none;}
  }

  /* provisional score */
  .prov-tag{display:inline-block;background:var(--brand-tint);color:var(--orange-2);border:1px dashed var(--orange);
    border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700;letter-spacing:.02em;}
  .prov-note{background:var(--brand-tint);border:1px solid var(--border-brand);border-left:3px solid var(--orange);
    border-radius:6px;padding:10px 12px;font-size:12.5px;color:var(--orange-2);margin-top:12px;}

  /* criterion note */
  .critnote{margin-top:8px;display:flex;align-items:center;gap:8px;}
  .critnote input{flex:1;background:var(--bg);border:1px dashed var(--border);font-size:11.5px;padding:6px 9px;border-radius:6px;color:var(--text);}
  .critnote input:focus{border-style:solid;border-color:var(--orange);}
  .critnote .ic{color:var(--muted-dim);font-size:12px;}
  .critnote input.filled{border-color:var(--green);border-style:solid;}

  /* suggestions */
  .suggest{background:rgba(87,148,242,.10);border:1px solid rgba(87,148,242,.30);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;}
  .suggest .st{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .schip{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(87,148,242,.18);font-size:12px;}
  .schip:last-child{border-bottom:none;}
  .schip .why{color:var(--muted);flex:1;}
  .schip button{background:var(--panel3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
  .schip button:hover{border-color:var(--blue);color:var(--blue);}
  .schip.applied{opacity:.55;}

  /* language switch */
  .langsw{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:2px;}
  .langsw button{background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:inherit;}
  .langsw button.on{background:var(--orange);color:#fff;}

  /* sparkline + compare */
  .spark{vertical-align:middle;}
  .cmp-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .cmp-toolbar label{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text);
    background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;margin:0;}
  .cmp-toolbar label input{accent-color:var(--orange);}
  .cmp-legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;font-size:12px;margin-top:8px;}
  .cmp-legend .row{display:flex;align-items:center;gap:6px;}
  .cmp-legend .sw{width:14px;height:3px;border-radius:2px;}

  /* print */
  @media print{
    header,nav,footer,.btn,.iconbtn,.navbtns,#saveIndic{display:none !important;}
    body{background:#fff;color:#111;}
    .card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid;}
    .card h2,.criterion .pts-live{color:#000;}
    .screen{display:block !important;}

/* ---- bulk portfolio import ---- */
// Turn a partial partner object into a full, computed portfolio entry.
function normalizeEntry(obj, existingList){
  const base = freshState();
  const profile = Object.assign({}, obj.profile||{});
  const scores = Object.assign({}, base.scores, obj.scores||{});
  const penalties = Object.assign({}, obj.penalties||{});
  const penaltySeverity = Object.assign({}, obj.penaltySeverity||{});
  const bonuses = Object.assign({}, obj.bonuses||{});
  const notes = Object.assign({}, obj.notes||{});
  const s = {profile, scores, notes, penalties, penaltySeverity, bonuses, meta:obj.meta||{}};
  const c = computeAll(s);
  const cls = classify(c.final);
  const id = profile.partnerName ? profile.partnerName.toLowerCase().trim()
                                 : ('partner_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
  const now = new Date().toISOString();
  let prevHistory = [];
  if(existingList){ const prev = existingList.find(p=>p.id===id); if(prev && Array.isArray(prev.history)) prevHistory = prev.history; }
  const history = (Array.isArray(obj.history) && obj.history.length)
    ? obj.history
    : prevHistory.concat([{at:now, final:c.final, skill:c.skill, scale:c.scale, will:c.will, fit:c.fit}]).slice(-24);
  return {id, profile, scores, notes, penalties, penaltySeverity, bonuses,
    computed:{...c}, category:cls.cat, verdict:cls.verdict, history, savedAt: obj.savedAt||now};
}
function bulkImportPortfolio(text){
  let data;
  try{ data = JSON.parse(text); }catch(err){ alert(t('cBulkInvalid', err.message)); return; }
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.partners) ? data.partners : null);
  if(!arr){ alert(t('cBulkFormat')); return; }
  let list = loadPortfolio();
  let added=0, updated=0;
  arr.forEach(obj=>{
    if(!obj || typeof obj!=='object' || !obj.profile) return;
    const entry = normalizeEntry(obj, list);
    const idx = list.findIndex(p=>p.id===entry.id);
    if(idx>=0){ list[idx]=entry; updated++; } else { list.push(entry); added++; }
  });
  if(added===0 && updated===0){ alert(t('cBulkEmpty')); return; }
  savePortfolio(list);
  currentScreen='portfolio'; render();
  alert(t('cBulkDone', added, updated));
}

}

/* ---- spreadsheet (Excel .xlsx / .csv) import ---- */
// SheetJS is loaded lazily, only the first time a spreadsheet is imported.
let _xlsxPromise=null;
function loadXLSX(){
  if(window.XLSX) return Promise.resolve(window.XLSX);
  if(_xlsxPromise) return _xlsxPromise;
  _xlsxPromise = new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>window.XLSX?res(window.XLSX):rej(new Error('SheetJS'));
    s.onerror=()=>rej(new Error('SheetJS'));
    document.head.appendChild(s);
  });
  return _xlsxPromise;
}
function normHdr(s){ return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,''); }
function buildImportMaps(){
  const prof={}, crit={};
  PROFILE_FIELDS.forEach(f=>{ [f.k, f.l&&f.l.fr, f.l&&f.l.en].forEach(x=>{ if(x) prof[normHdr(x)]=f; }); });
  Object.values(PILLARS).forEach(p=>p.criteria.forEach(c=>{ [c.k, c.l&&c.l.fr, c.l&&c.l.en].forEach(x=>{ if(x) crit[normHdr(x)]=c.k; }); }));
  return {prof,crit};
}
function parseLevel(v){
  const n=normHdr(v);
  if(n===''||n==='unknown'||n==='na'||n==='n'||n==='nonrenseigne') return null;
  if(['proven','confirme','confirmeavecpreuve','oui','ouiconfirme','yes','x','prouve','confirmed','1'].includes(n)) return 'proven';
  if(['declared','declare','declaresanspreuve','declaredgnoproof','partiel','partial','05'].includes(n)) return 'declared';
  if(['absent','non','no','0'].includes(n)) return 'absent';
  const num=parseFloat(String(v).replace(',','.'));
  if(!isNaN(num)){ if(num>=0.75) return 'proven'; if(num>=0.25) return 'declared'; return 'absent'; }
  return null;
}
function importSpreadsheet(file){
  const isCsv=/\.csv$/i.test(file.name);
  loadXLSX().then(XLSX=>{
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const wb = isCsv ? XLSX.read(reader.result,{type:'string'}) : XLSX.read(new Uint8Array(reader.result),{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{defval:''});
        const {prof,crit}=buildImportMaps();
        const entries=[];
        rows.forEach(row=>{
          const profile={}, scores={};
          Object.keys(row).forEach(h=>{
            const val=row[h]; const nh=normHdr(h);
            if(prof[nh]){
              const f=prof[nh];
              if(f.t==='checklist') profile[f.k]=String(val).split(/[;,/]/).map(s=>s.trim()).filter(Boolean);
              else profile[f.k]=val;
            } else if(crit[nh]){
              const lv=parseLevel(val); if(lv) scores[crit[nh]]=lv;
            }
          });
          if(profile.partnerName && String(profile.partnerName).trim()) entries.push({profile,scores});
        });
        if(!entries.length){ alert(t('cSheetEmpty')); return; }
        bulkImportPortfolio(JSON.stringify(entries));
      }catch(err){ alert(t('cImportInvalid', err.message)); }
    };
    if(isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
  }).catch(err=>alert(t('cImportInvalid', err.message)));
}
// Download a CSV template with the correct columns (profile fields + one column per scored criterion).
function downloadImportTemplate(){
  const profCols = PROFILE_FIELDS.map(f=>tx(f.l));
  const critCols = []; Object.values(PILLARS).forEach(p=>p.criteria.forEach(c=>critCols.push(tx(c.l))));
  const headers = profCols.concat(critCols);
  const example = headers.map((h,i)=>{
    if(i===0) return lang==='en'?'Example Partner':'Partenaire exemple';

  });
  const esc=s=>{ s=String(s==null?'':s); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const csv=[headers.map(esc).join(','), example.map(esc).join(',')].join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='gpae-modele-partenaires.csv'; a.click(); URL.revokeObjectURL(a.href);
}

/* ============================== SCORING ENGINE ============================== */

function criterionPoints(state, key, max){
  const level = state.scores[key];
  if(!level || level==='unknown') return 0;
  const lv = (LEVELS.concat(LEVELS_BINARY)).find(l=>l.k===level);
  if(!lv || lv.mult===null) return 0;
  return Math.round(max*lv.mult*10)/10;
}
function pillarScore(state, pillarKey){
  let total=0;
  PILLARS[pillarKey].criteria.forEach(c=>{ total += criterionPoints(state,c.k,c.max); });
  return Math.round(total*10)/10;
}
function pillarFillRatio(state, pillarKey){
  const pillar = PILLARS[pillarKey];
  const filled = pillar.criteria.filter(c=>state.scores[c.k] && state.scores[c.k]!=='unknown').length;
  return filled/pillar.criteria.length;
}
function overallFillRatio(state){
  let total=0, filled=0;
  Object.keys(PILLARS).forEach(pk=>{
    PILLARS[pk].criteria.forEach(c=>{
      total++;
      if(state.scores[c.k] && state.scores[c.k]!=='unknown') filled++;
    });
  });
  return total? filled/total : 0;
}
function profileFillRatio(state){
  const total = PROFILE_FIELDS.length;
  let filled=0;
  PROFILE_FIELDS.forEach(f=>{
    const v = state.profile[f.k];
    if(Array.isArray(v)? v.length : (v!=null && String(v).trim()!=='')) filled++;
  });
  return filled/total;
}
function penaltyTotal(state){
  let total=0;
  Object.keys(state.penalties||{}).forEach(k=>{
    if(!state.penalties[k]) return;
    const def = PENALTIES.find(p=>p.k===k);
    if(!def) return;
    if(def.disqualifying){ total += def.min; return; }
    const sev = state.penaltySeverity[k] || 'max';
    let val;
    if(def.min===def.max) val = def.min;
    else { if(sev==='min') val = def.max; else if(sev==='mid') val = Math.round((def.min+def.max)/2); else val = def.min; }
    total += val;
  });
  return total;
}
function bonusTotal(state){
  const checked = Object.keys(state.bonuses||{}).filter(k=>state.bonuses[k]).length;
  if(checked<2) return 0;
  return Math.min(10, checked*2);
}
function isDisqualified(state){ return !!(state.penalties && state.penalties['legal_risk']); }

function computeAll(state){
  const skill = pillarScore(state,'skill');
  const scale = pillarScore(state,'scale');
  const will = pillarScore(state,'will');
  const fit = pillarScore(state,'fit');
  const base = skill+scale+will+fit;
  const bonus = bonusTotal(state);
  const penalty = penaltyTotal(state);
  let final = base + bonus + penalty;
  if(final<0) final=0;
  if(final>100) final=100;
  if(isDisqualified(state)) final = Math.min(final, 15);
  const fillRatio = overallFillRatio(state);
  let confidence = fillRatio>0.8?'high':(fillRatio>=0.5?'mid':'low');
  const provisional = fillRatio < 0.5;
  return {skill,scale,will,fit,base,bonus,penalty,final,fillRatio,confidence,provisional};
}

function classify(score){
  if(score>=85) return {cat:'Strategic Growth Partner', priority:'P1', tier:tx({fr:'Tier stratégique / Elite',en:'Strategic / Elite tier'}), verdict:'Invest Now'};
  if(score>=70) return {cat:'High-Potential Partner', priority:tx({fr:'P1 (conditionnel)',en:'P1 (conditional)'}), tier:tx({fr:'Tier avancé',en:'Advanced tier'}), verdict:'Activate with Conditions'};
  if(score>=55) return {cat:'Incubate and Validate', priority:'P2', tier:tx({fr:'Tier registré',en:'Registered tier'}), verdict:'Incubate'};
  if(score>=40) return {cat:'Opportunistic / Referral Only', priority:'P3', tier:'Referral', verdict:'Referral Only'};
  return {cat:'Do Not Prioritize', priority:tx({fr:'Ne pas prioriser',en:'Do not prioritize'}), tier:'—', verdict:'Do Not Prioritize'};
}

/* ============================== SVG WIDGETS ============================== */

function gaugeSVG(percent, color, size){
  size = size||150;
  const r = size/2 - 10;
  const c = 2*Math.PI*r;
  const off = c*(1-percent/100);
  const cx = size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#2a2d35" stroke-width="9"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cx})"/>
  </svg>`;
}

function radarSVG(vals, size){
  // vals: array of {label, ratio(0-1), color}
  size = size||260;
  const cx=size/2, cy=size/2, R=size/2-38;
  const n=vals.length;
  const angle=i=> (Math.PI*2*i/n) - Math.PI/2;
  const pt=(i,r)=>[cx+Math.cos(angle(i))*r, cy+Math.sin(angle(i))*r];
  let grid='';
  [0.25,0.5,0.75,1].forEach(g=>{
    let p='';
    for(let i=0;i<n;i++){const [x,y]=pt(i,R*g);p+=`${x.toFixed(1)},${y.toFixed(1)} `;}
    grid+=`<polygon points="${p}" fill="none" stroke="#2a2d35" stroke-width="1"/>`;
  });
  let axes='',labels='';
  for(let i=0;i<n;i++){
    const [x,y]=pt(i,R);
    axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2d35" stroke-width="1"/>`;
    const [lx,ly]=pt(i,R+20);
    const anchor = Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');
    labels+=`<text x="${lx}" y="${ly+4}" fill="#8e8fa0" font-size="11" text-anchor="${anchor}">${vals[i].label}</text>`;
  }
  let poly='';
  for(let i=0;i<n;i++){const [x,y]=pt(i,R*Math.max(0.02,vals[i].ratio));poly+=`${x.toFixed(1)},${y.toFixed(1)} `;}
  let dots='';
  for(let i=0;i<n;i++){const [x,y]=pt(i,R*Math.max(0.02,vals[i].ratio));dots+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${vals[i].color}"/>`;}
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${grid}${axes}
    <polygon points="${poly}" fill="rgba(244,104,0,.18)" stroke="#f46800" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

function sparklineSVG(points, w, h, color){
  w=w||90; h=h||24; color=color||'#f46800';
  if(!points || points.length<2) return `<span style="color:var(--muted-dim);font-size:11px">${t('oneVersion')}</span>`;
  const vals = points.map(p=>p.final);
  const min=Math.min(...vals,0), max=Math.max(...vals,100);
  const rng = (max-min)||1;
  const step = w/(points.length-1);
  const y = v => h-2 - ((v-min)/rng)*(h-4);
  let d='';
  points.forEach((p,i)=>{ d += (i?'L':'M')+(i*step).toFixed(1)+','+y(p.final).toFixed(1)+' '; });
  const last = points[points.length-1], lx=(points.length-1)*step, ly=y(last.final);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.4" fill="${color}"/>
  </svg>`;
}

function radarMultiSVG(axes, series, size){
  size = size||300;
  const cx=size/2, cy=size/2, R=size/2-42, n=axes.length;
  const angle=i=> (Math.PI*2*i/n) - Math.PI/2;
  const pt=(i,r)=>[cx+Math.cos(angle(i))*r, cy+Math.sin(angle(i))*r];
  let grid='';
  [0.25,0.5,0.75,1].forEach(g=>{ let p=''; for(let i=0;i<n;i++){const[x,y]=pt(i,R*g);p+=`${x.toFixed(1)},${y.toFixed(1)} `;} grid+=`<polygon points="${p}" fill="none" stroke="#2a2d35" stroke-width="1"/>`; });
  let ax='',labels='';
  for(let i=0;i<n;i++){ const[x,y]=pt(i,R); ax+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2d35" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+22); const anchor=Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');
    labels+=`<text x="${lx}" y="${ly+4}" fill="#8e8fa0" font-size="11" text-anchor="${anchor}">${axes[i]}</text>`; }
  let polys='';
  series.forEach(s=>{ let poly=''; for(let i=0;i<n;i++){const[x,y]=pt(i,R*Math.max(0.02,s.ratios[i]));poly+=`${x.toFixed(1)},${y.toFixed(1)} `;}
    polys+=`<polygon points="${poly}" fill="${s.color}22" stroke="${s.color}" stroke-width="2"/>`; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${grid}${ax}${polys}${labels}</svg>`;
}

/* ============================== RENDER: NAV / HEADER ============================== */

function renderNav(){
  const nav = document.getElementById('nav');
  const pf = profileFillRatio(state), af = overallFillRatio(state);
  nav.innerHTML='';
  SCREENS.forEach(s=>{
    const b = document.createElement('button');
    b.className = s.id===currentScreen?'active':'';
    let done=false;
    if(s.id==='profile') done = pf>=0.99;
    else if(s.id==='assessment') done = af>=0.99;
    b.innerHTML = `<span class="step-dot ${done?'done':''}">${done?'✓':s.n}</span>${tx(s.label)}`;
    b.onclick = ()=>{ currentScreen=s.id; render(); window.scrollTo({top:0}); };
    nav.appendChild(b);
  });
}

function renderHeaderScore(){
  const c = computeAll(state);
  const cls = classify(c.final);
  const col = catColor(cls.cat);
  document.getElementById('headerScore').innerHTML =
    `<div class="hscore">
      <div class="ring">${gaugeSVG(c.final, col, 46)}<div class="num" style="color:${col}">${c.final.toFixed(0)}</div></div>
      <div class="meta"><div class="cat" style="color:${col}">${cls.cat}${c.provisional?` <span class="prov-tag">${t('provisional')}</span>`:''}</div><div class="verdict">${cls.verdict}</div></div>
    </div>`;
}

/* ============================== SCREEN 1 - PROFILE ============================== */

function fieldHtml(f){
  const val = state.profile[f.k]||'';
  const empty = Array.isArray(val)? !val.length : String(val).trim()==='';
  let html = `<div class="field ${f.req&&empty?'missing':''}" style="${(f.t==='textarea'||f.t==='checklist')?'grid-column:1/-1':''}"><label>${tx(f.l)}${f.req?`<span class="req-tag">${t('keyTag')}</span>`:''}</label>`;
  if(f.t==='textarea'){
    html += `<textarea data-k="${f.k}" onchange="onProfileChange(event)">${escapeHtml(val)}</textarea>`;
  } else if(f.t==='select'){
    html += `<select data-k="${f.k}" onchange="onProfileChange(event)"><option value="">—</option>${f.opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
  } else if(f.t==='checklist'){
    const arr = Array.isArray(val)?val:[];
    html += `<div class="chks">${f.opts.map(o=>`<label class="chk ${arr.includes(o)?'on':''}"><input type="checkbox" data-k="${f.k}" value="${o}" ${arr.includes(o)?'checked':''} onchange="onChecklistChange(event)"> ${o}</label>`).join('')}</div>`;
  } else {
    html += `<input type="${f.t}" data-k="${f.k}" value="${escapeHtml(val)}" onchange="onProfileChange(event)">`;
  }
  return html + `</div>`;
}
function renderProfile(){
  const pf = Math.round(profileFillRatio(state)*100);
  let html = `<div class="card"><h2><span class="accent"></span>${t('profileTitle')}</h2>
  <p class="hint">${t('profileHint')}</p>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px"><div class="bar" style="flex:1"><i style="width:${pf}%"></i></div><span style="font-size:12px;color:var(--muted);font-family:var(--font-mono);min-width:78px;text-align:right">${pf}${t('pctComplete')}</span></div>`;
  PROFILE_GROUPS.forEach(g=>{
    const fields = g.keys.map(k=>PROFILE_FIELDS.find(f=>f.k===k)).filter(Boolean);
    html += `<h3>${t(g.label)}</h3><div class="grid">${fields.map(fieldHtml).join('')}</div>`;
  });
  html += `</div>
  <div class="card"><div class="navbtns"><button class="btn" onclick="goTo('assessment')">${t('continueAssess')}</button></div></div>`;
  document.getElementById('main').innerHTML = html;
}

function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function onProfileChange(e){ state.profile[e.target.dataset.k] = e.target.value; saveState(); renderHeaderScore(); renderNav(); }
function onChecklistChange(e){
  const k = e.target.dataset.k;
  let arr = Array.isArray(state.profile[k])?state.profile[k]:[];
  if(e.target.checked) arr.push(e.target.value); else arr = arr.filter(v=>v!==e.target.value);
  state.profile[k]=arr; saveState();
  const lbl = e.target.closest('.chk'); if(lbl) lbl.classList.toggle('on', e.target.checked);
}
function goTo(id){ currentScreen=id; render(); window.scrollTo({top:0}); }

/* ============================== SCREEN 2 - ASSESSMENT ============================== */

function renderPillarCard(pillarKey){
  const pillar = PILLARS[pillarKey];
  const score = pillarScore(state,pillarKey);
  const pct = Math.round(score/pillar.max*100);
  let html = `<div class="card"><h2><span class="accent" style="background:${pillar.color}"></span>${pillar.label}
    <span style="color:var(--muted);font-weight:500;font-size:12px;margin-left:auto">${score}/${pillar.max} pts · ${t('weight')} ${pillar.weightPct}%</span></h2>
    <div class="bar" style="margin:8px 0 4px"><i style="width:${pct}%;background:${pillar.color}"></i></div>`;
  pillar.criteria.forEach(c=>{
    const isBinary = c.max===1;
    const levels = isBinary?LEVELS_BINARY:LEVELS;
    const cur = state.scores[c.k]||'unknown';
    const pts = criterionPoints(state,c.k,c.max);
    const note = (state.notes && state.notes[c.k]) || '';
    html += `<div class="criterion"><div class="top"><span class="name">${tx(c.l)}</span>
      <span class="max">${cur!=='unknown'?`<span class="pts-live">${pts}</span> / `:''}${c.max} pts</span></div>
      <div class="levels">`;
    levels.forEach(lv=>{
      html += `<button class="${cur===lv.k?'sel lv-'+lv.k:''}" onclick="setScore('${c.k}','${lv.k}')">${tx(lv.l)}</button>`;
    });
    html += `</div>
      <div class="critnote"><span class="ic">${t('noteIc')}</span><input type="text" value="${escapeHtml(note)}" placeholder="${t('notePh')}" class="${note?'filled':''}" oninput="setNote('${c.k}', this.value)"></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderAssessment(){
  let html = '';
  Object.keys(PILLARS).forEach(pk=> html += renderPillarCard(pk));

  html += `<div class="card"><h2><span class="accent" style="background:var(--red)"></span>${t('penaltiesTitle')}</h2>
  <p class="hint">${t('penaltiesHint')}</p>`;

  const suggestions = suggestPenalties(state);
  if(suggestions.length){
    html += `<div class="suggest"><div class="st"><span>${t('suggestTitle', suggestions.length)}</span><button onclick="applyAllSuggestions()">${t('applyAll')}</button></div>
    ${suggestions.map(s=>`<div class="schip"><b>${tx(PENALTIES.find(p=>p.k===s.key).l)}</b><span class="why">${s.why}</span><button onclick="applySuggestion('${s.key}')">${t('check')}</button></div>`).join('')}</div>`;
  }

  PENALTIES.forEach(p=>{
    const checked = !!(state.penalties && state.penalties[p.k]);
    html += `<div class="checkrow"><input type="checkbox" ${checked?'checked':''} onchange="setPenalty('${p.k}', this.checked)">
      <div style="flex:1"><div class="lbl">${tx(p.l)} ${checked?`<span class="badge ${p.sev}" style="margin-left:6px">${sevText(p.sev)}</span>`:''}</div>
      <div class="pts">${p.min===p.max? p.min+' pts' : p.min+(lang==='en'?' to ':' à ')+p.max+' pts'}${p.disqualifying?(lang==='en'?' · disqualifying':' · disqualifiant'):''}</div>
      ${(checked && p.min!==p.max && !p.disqualifying) ? `<div class="rangewrap" style="margin-top:6px"><input type="range" min="0" max="2" step="1" value="${sevIndex(state.penaltySeverity[p.k])}" oninput="setPenaltySeverity('${p.k}', this.value)"><span>${sevLabel(state.penaltySeverity[p.k])} (${penaltyValueFor(p, state.penaltySeverity[p.k])})</span></div>` : ''}
      </div></div>`;
  });
  html += `</div>`;

  html += `<div class="card"><h2><span class="accent" style="background:var(--green)"></span>${t('bonusTitle')}</h2>
  <p class="hint">${t('bonusHint')}</p>`;
  BONUS_SIGNALS.forEach((sig,i)=>{
    const k = 'b'+i;
    const checked = !!(state.bonuses && state.bonuses[k]);
    html += `<div class="checkrow"><input type="checkbox" ${checked?'checked':''} onchange="setBonus('${k}', this.checked)"><div class="lbl">${tx(sig)}</div></div>`;
  });
  const bt = bonusTotal(state);
  html += `<p class="hint" style="margin-top:10px">${t('bonusApplied', bt, Object.values(state.bonuses||{}).filter(Boolean).length)}</p></div>`;

  const c = computeAll(state);
  html += `<div class="card"><h2><span class="accent"></span>${t('liveScore')}</h2>
    <div class="pillbar">
      ${scorePill('Skill',c.skill,30,PILLARS.skill.color)}
      ${scorePill('Scale',c.scale,25,PILLARS.scale.color)}
      ${scorePill('Will',c.will,30,PILLARS.will.color)}
      ${scorePill('Strategic Fit',c.fit,15,PILLARS.fit.color)}
      <div class="pill"><div class="lab">${t('bonusLab')}</div><div class="val" style="color:var(--green)">${c.bonus>0?'+':''}${c.bonus}</div></div>
      <div class="pill"><div class="lab">${t('penaltyLab')}</div><div class="val" style="color:var(--red)">${c.penalty}</div></div>
    </div>
    <div class="navbtns"><button class="btn" onclick="goTo('decision')">${t('seeDecision')}</button></div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function scorePill(lab,val,max,col){
  const pct=Math.round(val/max*100);
  return `<div class="pill"><div class="lab">${lab} /${max}</div><div class="val" style="color:${col}">${val}</div>
    <div class="bar" style="margin-top:6px"><i style="width:${pct}%;background:${col}"></i></div></div>`;
}
function sevIndex(sev){ return sev==='min'?0:(sev==='mid'?1:2); }
function sevLabel(sev){ return sev==='min'?t('sevFaible'):(sev==='mid'?t('sevMoyen'):t('sevFort')); }
function penaltyValueFor(def,sev){
  if(def.min===def.max) return def.min;
  if(sev==='min') return def.max;
  if(sev==='mid') return Math.round((def.min+def.max)/2);
  return def.min;
}
function setScore(key, level){ state.scores[key]=level; saveState(); renderAssessment(); renderHeaderScore(); renderNav(); }
function setPenalty(key, checked){
  state.penalties = state.penalties||{};
  state.penalties[key]=checked;
  if(checked && !state.penaltySeverity[key]) state.penaltySeverity[key]='max';
  saveState(); renderAssessment(); renderHeaderScore();
}
function setPenaltySeverity(key, idx){
  state.penaltySeverity = state.penaltySeverity||{};
  state.penaltySeverity[key] = idx=='0'?'min':(idx=='1'?'mid':'max');
  saveState(); renderAssessment(); renderHeaderScore();
}
function setBonus(key, checked){ state.bonuses = state.bonuses||{}; state.bonuses[key]=checked; saveState(); renderAssessment(); renderHeaderScore(); }
function setNote(key, val){ state.notes = state.notes||{}; if(val) state.notes[key]=val; else delete state.notes[key]; saveState(); }
function suggestPenalties(state){
  const p = state.profile||{}, out=[];
  const has = v => v!=null && String(v).trim()!=='';
  const named = [p.namedAccount1,p.namedAccount2,p.namedAccount3].filter(has);
  const comp = (Array.isArray(p.competitors)?p.competitors:[]).filter(x=>x!=='Open-source only' && x!=='Autres');
  const checked = k => state.penalties && state.penalties[k];
  const add = (k,why)=>{ if(!checked(k)) out.push({key:k,why}); };
  const EN = lang==='en';
  if(!has(p.execSponsor)) add('no_sponsor', EN?'No executive sponsor entered in the profile.':'Aucun sponsor exécutif renseigné dans le profil.');
  if(named.length===0) add('no_named_accounts', EN?'No named account entered in the profile.':'Aucun compte nommé renseigné dans le profil.');
  if(!has(p.peopleToTrain)) add('no_training', EN?'Number of people to certify not entered.':'Nombre de personnes à certifier non renseigné.');
  if(comp.length>=4) add('too_many_competitors', EN? comp.length+' competing vendors declared as sold.' : comp.length+' vendors concurrents déclarés vendus.');
  if(!has(p.nextAction) && !has(p.actionSinceLast)) add('no_action_60d', EN?'No recent action nor next action entered.':'Aucune action récente ni prochaine action renseignée.');
  if(!has(p.pipelineTarget) && !has(p.existingOpps)) add('no_pipeline_sharing', EN?'Neither pipeline target nor opportunity entered.':'Ni objectif de pipeline ni opportunité renseignés.');
  if(!has(p.enterpriseAccess)) add('no_client_access', EN?'No Enterprise/Mid-Market account access entered.':'Aucun accès à des comptes Enterprise/Mid-Market renseigné.');
  return out;
}
function applySuggestion(key){ setPenalty(key,true); }
function applyAllSuggestions(){
  suggestPenalties(state).forEach(s=>{ state.penalties=state.penalties||{}; state.penalties[s.key]=true; if(!state.penaltySeverity[s.key]) state.penaltySeverity[s.key]='max'; });
  saveState(); renderAssessment(); renderHeaderScore();
}
function criterionLabel(key){
  for(const pk of Object.keys(PILLARS)){ const c=PILLARS[pk].criteria.find(x=>x.k===key); if(c) return {label:tx(c.l), pillar:PILLARS[pk].label}; }
  return {label:key, pillar:''};
}
function notesList(state){
  return Object.keys(state.notes||{}).filter(k=>state.notes[k]).map(k=>({key:k, note:state.notes[k], ...criterionLabel(k)}));
}

/* ============================== SCREEN 3 - DECISION ============================== */

function pillarArr(c){
  return [
    {k:'Skill', v:c.skill, max:30, color:PILLARS.skill.color},
    {k:'Scale', v:c.scale, max:25, color:PILLARS.scale.color},
    {k:'Will', v:c.will, max:30, color:PILLARS.will.color},
    {k:'Strategic Fit', v:c.fit, max:15, color:PILLARS.fit.color},
  ];
}
function weakestPillar(c){ return pillarArr(c).slice().sort((a,b)=>(a.v/a.max)-(b.v/b.max))[0]; }
function strongestPillar(c){ return pillarArr(c).slice().sort((a,b)=>(b.v/b.max)-(a.v/a.max))[0]; }
function activePenalties(){ return PENALTIES.filter(p=> state.penalties && state.penalties[p.k]); }

function renderDecision(){
  const c = computeAll(state);
  const cls = classify(c.final);

      <div style="flex:1;min-width:200px">
        <div class="catbadge" style="background:${col};color:#0d0d0f">${cls.cat}</div>${c.provisional?` <span class="prov-tag">${t('provScore')}</span>`:''}
        <p style="margin:12px 0 4px;font-size:13.5px">${t('decRecommended')} : <b style="color:${col}">${cls.verdict}</b></p>
        <p style="font-size:12.5px;color:var(--muted)">${t('priorityWord')} ${cls.priority} · ${cls.tier}</p>
        <div style="margin-top:8px"><span class="conf ${c.confidence}">${confLabel(c.confidence)} — ${t('critFilled', Math.round(c.fillRatio*100))}</span></div>
        ${c.provisional?`<div class="prov-note">${t('provNote')}</div>`:''}
      </div>
      <div class="radar-wrap">${radarSVG(radarVals,240)}</div>
    </div>
  </div>`;

  html += `<div class="card exec"><h2><span class="accent"></span>${t('execTitle')}</h2><p>
  ${t('execBody', pName, pType, state.profile.country||'', c.final.toFixed(0), cls.cat, strong, weak, nPen, cls.verdict)}
  </p></div>`;

  html += `<div class="card"><h2><span class="accent"></span>${t('scorecardTitle')}</h2>
  <table><thead><tr><th>${t('thDimension')}</th><th>${t('thScore')}</th><th>${t('thMax')}</th><th>${t('thProgress')}</th><th>${t('thEvidence')}</th></tr></thead><tbody>
  ${scorecardRow('Skill', c.skill, 30, 'skill')}
  ${scorecardRow('Scale', c.scale, 25, 'scale')}
  ${scorecardRow('Will', c.will, 30, 'will')}
  ${scorecardRow('Strategic Fit', c.fit, 15, 'fit')}

function saveToPortfolio(){
  const c = computeAll(state);
  const cls = classify(c.final);
  let list = loadPortfolio();
  const id = state.profile.partnerName ? state.profile.partnerName.toLowerCase().trim() : ('partner_'+Date.now());
  const now = new Date().toISOString();
  const idx = list.findIndex(p=>p.id===id);
  // Carry over history from any previous save of the same partner.
  const prevHistory = (idx>=0 && Array.isArray(list[idx].history)) ? list[idx].history : [];
  const history = prevHistory.concat([{at:now, final:c.final, skill:c.skill, scale:c.scale, will:c.will, fit:c.fit}]).slice(-24);
  // Store FULL snapshot so it can be fully restored later.
  const entry = {
    id,
    profile:{...state.profile},
    scores:{...state.scores},
    notes:{...state.notes},
    penalties:{...state.penalties},
    penaltySeverity:{...state.penaltySeverity},
    bonuses:{...state.bonuses},
    computed:{...c},
    category:cls.cat, verdict:cls.verdict,
    history,
    savedAt:now
  };
  if(idx>=0) list[idx]=entry; else list.push(entry);
  savePortfolio(list);
  const delta = prevHistory.length ? (c.final - prevHistory[prevHistory.length-1].final) : 0;
  alert(prevHistory.length ? t('cSavedDelta', history.length, delta.toFixed(0)) : t('cSavedFirst', history.length));
  render();
}

  L.push('## '+(EN?'Named accounts':'Comptes nommés'));
  L.push(named.length? named.map(n=>`- ${n}`).join('\n') : (EN?'- No named account provided.':'- Aucun compte nommé communiqué.'));
  L.push('');
  L.push('## '+t('mOffer'));
  L.push(offerToPosition(state));
  L.push('');
  L.push('## '+(EN?'10 questions to ask':'10 questions à poser'));
  QUESTION_BANK.forEach((q,i)=> L.push(`${i+1}. ${q.q(state)}`));
  L.push('');
  L.push('## '+t('mObjections'));
  likelyObjections(state).forEach(o=> L.push(`- ${o}`));
  const active = activePenalties();
  if(active.length){
    L.push('');
    L.push('## '+(EN?'Red flags to clarify':'Red flags à clarifier'));
    active.forEach(p=> L.push(`- **${tx(p.l)}** — ${riskQuestion(p.k)}`));
  }
  L.push('');
  L.push('## '+t('mCommit'));
  L.push(t('mCommitBody'));
  return L.join('\n');
}
function copyMeetingMarkdown(){
  const md = buildMeetingMarkdown(state);
  const done = ()=>{ const el=document.getElementById('mdCopyMsg'); if(el){el.textContent=t('copied');setTimeout(()=>el.textContent='',2000);} };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(done).catch(()=>fallbackCopy(md,done)); }
  else fallbackCopy(md, done);
}
function fallbackCopy(text, done){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done&&done(); }catch(e){ alert(t('cCopyFail')); }
  document.body.removeChild(ta);
}
function downloadMeetingMarkdown(){
  const md = buildMeetingMarkdown(state);
  const blob = new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const name=(state.profile.partnerName||'partner').toLowerCase().replace(/[^a-z0-9]+/g,'-');
  a.download=`brief-meeting-${name}.md`; a.click(); URL.revokeObjectURL(a.href);
}

function likelyObjections(state){

    : `« Nous avons déjà des revenus établis sur ${comp[0]}, pourquoi ajouter Grafana ? » → Positionner la complémentarité et les cas de migration/coexistence, pas un remplacement forcé.`);

function buildConditions(state,c){

function verdictJustification(state,c,cls){

    return `${pName} scores ${c.final.toFixed(0)}/100, with ${strongestPillar(c).k} as the main anchor and ${weak.k} as the biggest constraint. `+
    `${activePenalties().length? 'Active red flags ('+activePenalties().length+') reinforce the recommended caution.' : 'No red flag is active at this stage, but confidence remains ' + confLabel(c.confidence).toLowerCase() + '.'} `+
    `The "${cls.verdict}" recommendation reflects a balance between demonstrated potential and the level of proof available today.`;
  }
  return `${pName} obtient ${c.final.toFixed(0)}/100, avec ${strongestPillar(c).k} comme point d'appui principal et ${weak.k} comme frein le plus important. `+
  `${activePenalties().length? 'Des red flags actifs ('+activePenalties().length+') renforcent la prudence recommandée.' : 'Aucun red flag n\'est actif à ce stade, mais la confiance reste ' + confLabel(c.confidence).toLowerCase() + '.'} `+
  `La recommandation « ${cls.verdict} » reflète un équilibre entre le potentiel démontré et le niveau de preuve disponible aujourd'hui.`;

function nextDecision(cls){
  const EN = lang==='en';
  if(cls.verdict==='Invest Now') return EN?'Allocate a dedicated Channel budget and name a single internal owner.':'Allouer un budget Channel dédié et nommer un owner interne unique.';
  if(cls.verdict==='Activate with Conditions') return EN?'Make any additional investment conditional on obtaining the proofs listed in section 9.':'Conditionner tout investissement additionnel à l\'obtention des preuves listées en section 9.';
  if(cls.verdict==='Incubate') return EN?'Launch the small-scale test before any tier decision.':'Lancer le test à échelle réduite avant toute décision de tier.';
  if(cls.verdict==='Referral Only') return EN?'Document the referral status and do not allocate dedicated Channel resources.':'Documenter le statut referral et ne pas allouer de ressources Channel dédiées.';
  return EN?'Do not proceed unless a concrete, qualified deal appears.':'Ne pas poursuivre sauf apparition d\'un deal concret et qualifié.';
}
function reevalDate(cls){
  const days = cls.verdict==='Invest Now'?90:(cls.verdict==='Activate with Conditions'?90:(cls.verdict==='Incubate'?60:30));

function filteredSortedPortfolio(list){
  const q = portfolioQuery.trim().toLowerCase();
  let out = q ? list.filter(p=>{

  }) : list.slice();
  const fin = p=>((p.computed||p.scores).final||0);
  if(portfolioSort==='name') out.sort((a,b)=>(a.profile.partnerName||'').localeCompare(b.profile.partnerName||''));
  else if(portfolioSort==='recent') out.sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));

function renderCompareCard(list){
  compareSel = compareSel.filter(id=>list.some(p=>p.id===id));
  const axes = ['Skill','Scale','Will','Fit'];
  const maxes = {Skill:30,Scale:25,Will:30,Fit:15};
  const selected = compareSel.map(id=>list.find(p=>p.id===id)).filter(Boolean).slice(0,3);
  const series = selected.map((p,i)=>{ const cc=p.computed||p.scores; return {
    name:p.profile.partnerName||'?', color:COMPARE_COLORS[i%3],
    ratios:[(cc.skill||0)/maxes.Skill,(cc.scale||0)/maxes.Scale,(cc.will||0)/maxes.Will,(cc.fit||0)/maxes.Fit]
  };});
  let html = `<div class="card"><h2><span class="accent"></span>${t('cmpTitle')}</h2>
  <p class="hint">${t('cmpHint')}</p>
  <div class="cmp-toolbar">${list.map(p=>{
    const on = compareSel.includes(p.id);
    const dis = !on && compareSel.length>=3;
    return `<label style="${dis?'opacity:.4;cursor:not-allowed':''}"><input type="checkbox" ${on?'checked':''} ${dis?'disabled':''} onchange="toggleCompare('${p.id}')"> ${escapeHtml(p.profile.partnerName||'?')}</label>`;
  }).join('')}</div>`;
  if(series.length){
    html += `<div style="display:flex;justify-content:center">${radarMultiSVG(axes, series, 320)}</div>
    <div class="cmp-legend">${series.map(s=>`<div class="row"><span class="sw" style="background:${s.color}"></span>${escapeHtml(s.name)}</div>`).join('')}</div>`;
  } else {
    html += `<div class="empty">${t('cmpEmpty')}</div>`;
  }
  html += `</div>`;
  return html;
}
function toggleCompare(id){
  const i = compareSel.indexOf(id);
  if(i>=0) compareSel.splice(i,1);
  else { if(compareSel.length>=3) return; compareSel.push(id); }
  renderPortfolio();
}
function catColorHex(cat){
  if(cat==='Strategic Growth Partner') return '#73bf69';
  if(cat==='High-Potential Partner') return '#37c2ba';
  if(cat==='Incubate and Validate') return '#fade2a';
  if(cat==='Opportunistic / Referral Only') return '#f4a638';
  return '#f2495c';
}
function loadFromPortfolio(id){
  const list = loadPortfolio();
  const entry = list.find(p=>p.id===id);
  if(!entry) return;
  if(!confirm(t('cLoad'))) return;
  // Full restore now that the snapshot stores everything.
  state = Object.assign(freshState(), {
    profile:{...entry.profile},
    scores:{...(entry.scores||{})},
    notes:{...(entry.notes||{})},
    penalties:{...(entry.penalties||{})},
    penaltySeverity:{...(entry.penaltySeverity||{})},
    bonuses:{...(entry.bonuses||{})},
    meta:{savedAt:entry.savedAt}
  });
  saveState();
  currentScreen='decision';
  render(); window.scrollTo({top:0});
}
function deleteFromPortfolio(id){
  if(!confirm(t('cDelete'))) return;
  let list = loadPortfolio().filter(p=>p.id!==id);
  savePortfolio(list); render();
}
function exportPortfolioCSV(){
  const list = loadPortfolio();
  const loc = lang==='en'?'en-US':'fr-FR';
  const header = lang==='en'
    ? ['Partner','Type','Country','Score','Skill','Scale','Will','Fit','Category','Verdict','Saved']
    : ['Partenaire','Type','Pays','Score','Skill','Scale','Will','Fit','Catégorie','Verdict','Enregistré'];
  const rows = [header];
  list.forEach(p=>{ const cc=p.computed||p.scores;
    rows.push([p.profile.partnerName||'',p.profile.partnerType||'',p.profile.country||'',
      (cc.final||0).toFixed(0),cc.skill||'',cc.scale||'',cc.will||'',cc.fit||'',p.category||'',p.verdict||'',
      new Date(p.savedAt).toLocaleDateString(loc)]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gpae-portfolio.csv'; a.click(); URL.revokeObjectURL(a.href);
}

/* ============================== MAIN RENDER ============================== */

function renderChrome(){
  document.documentElement.setAttribute('lang', lang);
  const sub=document.getElementById('subTitle'); if(sub) sub.textContent=t('sub');
  const foot=document.getElementById('footer'); if(foot) foot.textContent=t('footer');
  const tb=document.getElementById('toolbtns');
  if(tb) tb.innerHTML =
    `<button class="iconbtn" onclick="newEvaluation()" title="${t('tbNewT')}">${t('tbNew')}</button>
     <button class="iconbtn" onclick="exportJSON()" title="${t('tbExportT')}">${t('tbExport')}</button>
     <button class="iconbtn" onclick="document.getElementById('importFile').click()" title="${t('tbImportT')}">${t('tbImport')}</button>
     <button class="iconbtn" onclick="window.print()" title="${t('tbPdfT')}">${t('tbPdf')}</button>`;
  const si=document.getElementById('saveIndic'); if(si && !si.classList.contains('flash')) si.textContent=t('ready');
  document.querySelectorAll('#langsw button').forEach(b=>{
    const on = b.dataset.l===lang;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on?'true':'false');
  });
}
function render(){
  renderChrome();
  renderNav();
  renderHeaderScore();
  if(currentScreen==='profile') renderProfile();
  else if(currentScreen==='assessment') renderAssessment();
  else if(currentScreen==='decision') renderDecision();
  else if(currentScreen==='meeting') renderMeeting();
  else if(currentScreen==='plan') renderPlan();
  else if(currentScreen==='portfolio') renderPortfolio();
  const m=document.getElementById('main');
  if(m){ m.classList.remove('screen-in'); void m.offsetWidth; m.classList.add('screen-in'); }
}

render();
</script>
