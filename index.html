<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Grafana Partner Assessment Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    /* Grafana-inspired palette */
    --bg:#0b0c0e; --bg-grad:#111217;
    --panel:#181b1f; --panel2:#22252b; --panel3:#2a2d35;
    --border:#2c2f36; --border-soft:#23262c;
    --text:#d8d9e0; --text-strong:#f4f5f8; --muted:#8e8fa0; --muted-dim:#6a6b78;
    --orange:#f46800; --orange-2:#ff8833; --orange-dim:#3a2412;
    --pink:#f55f9e; --purple:#a352cc;
    --green:#3cbf7a; --yellow:#e0b23c; --red:#e35b5b; --blue:#5b9de3;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:Inter,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #17181f 0%, var(--bg) 55%);color:var(--text);
    -webkit-font-smoothing:antialiased;line-height:1.5;}

  /* ---------- HEADER ---------- */
  header{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:14px;background:rgba(11,12,14,.7);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo-chip{background:#f5f5f7;border-radius:9px;padding:7px 11px;display:inline-flex;align-items:center;flex:none;box-shadow:0 1px 2px rgba(0,0,0,.35);}
  .logo{height:26px;width:auto;display:block;}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.01em;color:var(--text-strong);}
  header .sub{color:var(--muted);font-size:12px;margin-top:1px;}
  .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .toolbtns{display:flex;gap:6px;}
  .iconbtn{background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:8px;
    padding:7px 11px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
  .iconbtn:hover{color:var(--text-strong);border-color:var(--panel3);background:var(--panel3);}
  #saveIndic{font-size:11px;color:var(--muted-dim);min-width:70px;text-align:right;transition:color .3s;}
  #saveIndic.flash{color:var(--green);}

  /* header mini gauge */
  .hscore{display:flex;align-items:center;gap:10px;}
  .hscore .ring{position:relative;width:46px;height:46px;flex:none;}
  .hscore .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;}
  .hscore .meta{text-align:right;}
  .hscore .meta .cat{font-size:12px;font-weight:600;}
  .hscore .meta .verdict{font-size:11px;color:var(--muted);}

  /* ---------- NAV ---------- */
  nav{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;
    background:var(--panel);position:sticky;top:67px;z-index:15;}
  nav button{background:none;border:none;color:var(--muted);padding:13px 15px;font-size:13px;cursor:pointer;
    border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:8px;}
  nav button.active{color:var(--orange);border-bottom-color:var(--orange);}
  nav button:hover{color:var(--text-strong);}
  nav .step-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);font-size:9px;
    display:inline-flex;align-items:center;justify-content:center;color:var(--muted-dim);font-weight:700;}
  nav button.active .step-dot{border-color:var(--orange);color:var(--orange);}
  nav .step-dot.done{background:var(--green);border-color:var(--green);color:#062012;}

  main{max-width:1100px;margin:0 auto;padding:24px 20px 90px;}
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- CARDS ---------- */
  .card{background:linear-gradient(180deg,var(--panel) 0%,#15171b 100%);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card h2{margin:0 0 4px;font-size:14px;color:var(--text-strong);font-weight:700;display:flex;align-items:center;gap:8px;}
  .card h2 .accent{width:4px;height:16px;border-radius:3px;background:linear-gradient(180deg,var(--orange),var(--pink));display:inline-block;}
  .card h3{margin:18px 0 8px;font-size:13px;color:var(--text);border-top:1px solid var(--border-soft);padding-top:14px;font-weight:600;}
  .card h3:first-of-type{border-top:none;padding-top:0;}
  .card .hint{color:var(--muted);font-size:12px;margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media(max-width:760px){.grid,.grid3{grid-template-columns:1fr;}}

  label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:500;}
  input[type=text],input[type=number],input[type=date],textarea,select{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;transition:border-color .15s,box-shadow .15s;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,104,0,.15);}
  textarea{resize:vertical;min-height:58px;}
  .field{margin-bottom:12px;}
  .field.missing input,.field.missing textarea,.field.missing select{border-color:var(--border);}
  .field .req-tag{color:var(--yellow);font-size:10px;margin-left:6px;}

  .checkrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
  .checkrow:last-child{border-bottom:none;}
  .checkrow input{margin-top:3px;accent-color:var(--orange);}
  .checkrow .lbl{font-size:12.5px;}
  .checkrow .pts{color:var(--muted);font-size:11px;}

  .criterion{border-bottom:1px solid var(--border-soft);padding:12px 0;}
  .criterion:last-child{border-bottom:none;}
  .criterion .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px;}
  .criterion .name{font-size:13px;}
  .criterion .max{font-size:11px;color:var(--muted);white-space:nowrap;}
  .criterion .pts-live{color:var(--orange);font-weight:700;}
  .levels{display:flex;gap:6px;flex-wrap:wrap;}
  .levels button{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);
    padding:8px;font-size:11.5px;border-radius:8px;cursor:pointer;text-align:center;font-family:inherit;transition:.12s;}
  .levels button:hover{border-color:var(--panel3);color:var(--text);}
  .levels button.sel{background:var(--orange-dim);border-color:var(--orange);color:var(--text-strong);font-weight:600;}
  .levels button.sel.lv-absent{background:#3a1414;border-color:var(--red);}
  .levels button.sel.lv-declared{background:#3a3414;border-color:var(--yellow);}
  .levels button.sel.lv-proven{background:#153a25;border-color:var(--green);}

  /* progress bar */
  .bar{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--orange-2));}

  .pillbar{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;}
  .pill{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:130px;}
  .pill .val{font-size:22px;font-weight:800;}
  .pill .lab{font-size:11px;color:var(--muted);margin-bottom:8px;}

  .btn{background:linear-gradient(180deg,var(--orange-2),var(--orange));color:#241300;border:none;border-radius:8px;
    padding:10px 17px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn:hover{filter:brightness(1.07);}
  .btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
  .btn.secondary:hover{background:var(--panel3);}
  .btn.ghost{background:none;border:1px solid var(--border);color:var(--muted);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table th,table td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border-soft);vertical-align:top;}
  table th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
  table tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.crit{background:#3a1414;color:var(--red);}
  .badge.high{background:#3a2a14;color:#f0a13c;}
  .badge.med{background:#3a3414;color:var(--yellow);}
  .badge.low{background:#153a25;color:var(--green);}

  .scorehero{display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .gauge{position:relative;width:150px;height:150px;flex:none;}
  .gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge .center .n{font-size:42px;font-weight:800;line-height:1;}
  .gauge .center .d{font-size:13px;color:var(--muted);font-weight:600;}
  .catbadge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;}

  .flag{border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;background:var(--panel2);}
  .flag.crit{border-left:3px solid var(--red);}
  .flag.high{border-left:3px solid #f0a13c;}
  .flag.med{border-left:3px solid var(--yellow);}
  .flag.low{border-left:3px solid var(--green);}
  .flag .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;}
  .flag .head .name{font-size:13px;font-weight:600;}
  .flag p{margin:5px 0;font-size:12.5px;color:var(--muted);}
  .flag p b{color:var(--text);font-weight:600;}

  .qbank{padding-left:20px;}
  .qbank li{margin-bottom:11px;font-size:13px;}
  .qbank.clean{list-style:none;padding-left:0;}
  .qbank.clean li{padding:10px 0;border-bottom:1px solid var(--border-soft);display:flex;gap:10px;}
  .qbank.clean li:before{content:"→";color:var(--orange);font-weight:700;}

  .planphase{margin-bottom:18px;}
  .planphase h4{margin:0 0 8px;font-size:13px;color:var(--orange);display:flex;align-items:center;gap:8px;}
  .planphase h4 .tag{background:var(--orange-dim);color:var(--orange-2);border-radius:6px;padding:2px 8px;font-size:10px;}
  .plangrid{display:grid;grid-template-columns:2fr 1fr 1fr 2fr;gap:10px;font-size:12px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
  .plangrid.head{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;}
  @media(max-width:640px){.plangrid{grid-template-columns:1fr;gap:3px;padding:12px 0;}.plangrid.head{display:none;}}

  .empty{color:var(--muted);font-size:13px;padding:40px 0;text-align:center;}

  /* matrix */
  .matrix{position:relative;width:100%;height:440px;background:
    linear-gradient(180deg,var(--panel2),#191b20);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;}
  .matrix .qlabel{position:absolute;font-size:11px;color:var(--muted-dim);padding:8px;max-width:45%;}
  .dot{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #0b0c0e;transform:translate(-50%,-50%);cursor:pointer;transition:.12s;}
  .dot:hover{transform:translate(-50%,-50%) scale(1.35);z-index:5;}
  .dot .dlabel{position:absolute;left:50%;top:-22px;transform:translateX(-50%);white-space:nowrap;font-size:10px;
    background:var(--panel3);border:1px solid var(--border);padding:2px 6px;border-radius:6px;color:var(--text);opacity:0;pointer-events:none;transition:.12s;}
  .dot:hover .dlabel{opacity:1;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .conf{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;}
  .conf.high{background:#153a25;color:var(--green);}
  .conf.mid{background:#3a3414;color:var(--yellow);}
  .conf.low{background:#3a1414;color:var(--red);}
  .exec p{font-size:13.5px;line-height:1.65;}

  .rangewrap{display:flex;align-items:center;gap:10px;}
  .rangewrap input[type=range]{flex:1;accent-color:var(--orange);}
  .rangewrap span{font-size:12px;color:var(--muted);min-width:60px;text-align:right;}

  .radar-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .legend{display:flex;flex-direction:column;gap:6px;font-size:12px;}
  .legend .row{display:flex;align-items:center;gap:8px;}
  .legend .sw{width:10px;height:10px;border-radius:3px;}

  .navbtns{display:flex;gap:8px;flex-wrap:wrap;}

  footer{text-align:center;color:var(--muted-dim);font-size:11px;padding:24px;}

  /* provisional score */
  .prov-tag{display:inline-block;background:#3a2414;color:var(--orange-2);border:1px dashed var(--orange);
    border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700;letter-spacing:.02em;}
  .prov-note{background:#221a10;border:1px solid var(--orange-dim);border-left:3px solid var(--orange);
    border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--orange-2);margin-top:12px;}

  /* criterion note */
  .critnote{margin-top:8px;display:flex;align-items:center;gap:8px;}
  .critnote input{flex:1;background:var(--bg);border:1px dashed var(--border);font-size:11.5px;padding:6px 9px;border-radius:6px;color:var(--text);}
  .critnote input:focus{border-style:solid;border-color:var(--orange);}
  .critnote .ic{color:var(--muted-dim);font-size:12px;}
  .critnote input.filled{border-color:var(--green);border-style:solid;}

  /* suggestions */
  .suggest{background:#1c2530;border:1px solid #2c3a49;border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .suggest .st{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .schip{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #223040;font-size:12px;}
  .schip:last-child{border-bottom:none;}
  .schip .why{color:var(--muted);flex:1;}
  .schip button{background:var(--panel3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
  .schip button:hover{border-color:var(--blue);color:var(--blue);}
  .schip.applied{opacity:.55;}

  /* sparkline + compare */
  .spark{vertical-align:middle;}
  .cmp-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .cmp-toolbar label{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text);
    background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;margin:0;}
  .cmp-toolbar label input{accent-color:var(--orange);}
  .cmp-legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;font-size:12px;margin-top:8px;}
  .cmp-legend .row{display:flex;align-items:center;gap:6px;}
  .cmp-legend .sw{width:14px;height:3px;border-radius:2px;}

  /* print */
  @media print{
    header,nav,footer,.btn,.iconbtn,.navbtns,#saveIndic{display:none !important;}
    body{background:#fff;color:#111;}
    .card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid;}
    .card h2,.criterion .pts-live{color:#000;}
    .screen{display:block !important;}
    main{max-width:100%;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo-chip"><img class="logo" src="assets/grafana-labs-logo.png" alt="Grafana Labs"></span>
    <div>
      <h1>Partner Assessment Engine</h1>
      <div class="sub">Skill · Scale · Will · Strategic Fit — évaluation objective d'un partenaire Grafana Labs</div>
    </div>
  </div>
  <div class="header-right">
    <div class="toolbtns">
      <button class="iconbtn" onclick="newEvaluation()" title="Nouvelle évaluation">＋ Nouveau</button>
      <button class="iconbtn" onclick="exportJSON()" title="Exporter en JSON">↧ Export JSON</button>
      <button class="iconbtn" onclick="document.getElementById('importFile').click()" title="Importer un JSON">↥ Importer</button>
      <button class="iconbtn" onclick="window.print()" title="Imprimer / PDF">⎙ PDF</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
    </div>
    <span id="saveIndic">Prêt</span>
    <div id="headerScore"></div>
  </div>
</header>

<nav id="nav"></nav>

<main id="main"></main>

<footer>Prototype interne — scores calculés localement dans votre navigateur (aucune donnée envoyée). Sauvegarde automatique via localStorage. Export JSON pour backup/partage.</footer>

<script>
/* ============================== DATA MODEL ============================== */

const SCREENS = [
  {id:'profile', label:'Profil', n:1},
  {id:'assessment', label:'Évaluation', n:2},
  {id:'decision', label:'Décision', n:3},
  {id:'meeting', label:'Prép. Meeting', n:4},
  {id:'plan', label:"Plan d'activation", n:5},
  {id:'portfolio', label:'Portfolio', n:6},
];

const PROFILE_FIELDS = [
  {k:'partnerName', l:'Nom du partenaire', t:'text', req:true},
  {k:'country', l:'Pays / zones couvertes', t:'text'},
  {k:'partnerType', l:'Type de partenaire', t:'select', opts:['System Integrator','Reseller','MSP','MSSP','Cloud Service Provider','Consulting Partner','Technology Partner','OEM','Referral Partner','Distributor']},
  {k:'employees', l:'Nombre d\'employés', t:'text'},
  {k:'revenue', l:'Chiffre d\'affaires estimé', t:'text'},
  {k:'sectors', l:'Secteurs couverts', t:'text'},
  {k:'enterpriseAccess', l:'Accès comptes Enterprise / Mid-Market (exemples)', t:'textarea'},
  {k:'dominantMotion', l:'Motion commerciale dominante', t:'select', opts:['Resale','Referral','Services','Managed services','Cloud marketplace','Co-sell']},
  {k:'competitors', l:'Concurrents actuellement vendus', t:'checklist', opts:['Datadog','Dynatrace','Splunk','Elastic','New Relic','AppDynamics','Open-source only','Autres']},
  {k:'execSponsor', l:'Sponsor exécutif (nom + niveau d\'engagement)', t:'text', req:true},
  {k:'salesChampion', l:'Champion commercial', t:'text'},
  {k:'techChampion', l:'Champion technique', t:'text'},
  {k:'salesDedicated', l:'Ressources commerciales dédiées (nb personnes)', t:'text'},
  {k:'techDedicated', l:'Ressources techniques dédiées (nb personnes)', t:'text'},
  {k:'peopleToTrain', l:'Nombre de personnes à certifier', t:'text'},
  {k:'namedAccount1', l:'Compte nommé #1', t:'text', req:true},
  {k:'namedAccount2', l:'Compte nommé #2', t:'text'},
  {k:'namedAccount3', l:'Compte nommé #3', t:'text'},
  {k:'existingOpps', l:'Opportunités existantes', t:'textarea'},
  {k:'pipelineTarget', l:'Objectif de pipeline sur 12 mois', t:'text'},
  {k:'actionSinceLast', l:'Action déjà exécutée depuis le dernier échange', t:'textarea'},
  {k:'nextAction', l:'Prochaine action', t:'text'},
  {k:'nextActionDate', l:'Date de la prochaine action', t:'date'},
  {k:'meetingNotes', l:'Notes qualitatives / compte rendu du dernier meeting', t:'textarea'},
];

const LEVELS = [
  {k:'unknown', l:'Non renseigné', mult:null},
  {k:'absent',  l:'Absent', mult:0},
  {k:'declared',l:'Déclaré sans preuve', mult:0.5},
  {k:'proven',  l:'Confirmé avec preuve', mult:1},
];
const LEVELS_BINARY = [
  {k:'unknown', l:'Non renseigné', mult:null},
  {k:'absent',  l:'Non', mult:0},
  {k:'proven',  l:'Oui, confirmé', mult:1},
];

const PILLARS = {
  skill: {
    label:'Skill', max:30, weightPct:30, color:'#f46800',
    criteria:[
      {k:'obs_expertise', l:'Expertise observabilité', max:6},
      {k:'grafana_stack', l:'Compétences Grafana, Prometheus, Loki, Tempo, Mimir, Alloy, OpenTelemetry', max:6},
      {k:'delivery', l:'Capacité de delivery, migration, POC et services professionnels', max:5},
      {k:'cloud_k8s', l:'Compétences cloud et Kubernetes', max:4},
      {k:'commercial_positioning', l:'Capacité commerciale à positionner une plateforme d\'observabilité', max:4},
      {k:'client_refs', l:'Références clients démontrables', max:3},
      {k:'offer_building', l:'Capacité à construire une offre ou un managed service', max:2},
    ]
  },
  scale: {
    label:'Scale', max:25, weightPct:25, color:'#f55f9e',
    criteria:[
      {k:'geo_coverage', l:'Couverture géographique pertinente', max:4},
      {k:'enterprise_access', l:'Accès aux comptes Enterprise et Mid-Market', max:5},
      {k:'mobilizable_team', l:'Nombre de vendeurs et consultants mobilisables', max:4},
      {k:'verticals', l:'Présence dans les verticales prioritaires', max:4},
      {k:'marketing_capacity', l:'Capacité marketing et génération de demande', max:3},
      {k:'recurring_services', l:'Capacité à vendre des services récurrents', max:3},
      {k:'hyperscaler_rel', l:'Relations avec AWS, Azure ou GCP', max:2},
    ]
  },
  will: {
    label:'Will', max:30, weightPct:30, color:'#a352cc',
    criteria:[
      {k:'exec_sponsor', l:'Sponsor exécutif identifié et engagé', max:5},
      {k:'sales_resources', l:'Ressources commerciales dédiées', max:4},

/* ============================== SCORING ENGINE ============================== */

function criterionPoints(state, key, max){
  const level = state.scores[key];
  if(!level || level==='unknown') return 0;
  const lv = (LEVELS.concat(LEVELS_BINARY)).find(l=>l.k===level);
  if(!lv || lv.mult===null) return 0;
  return Math.round(max*lv.mult*10)/10;
}
function pillarScore(state, pillarKey){
  let total=0;
  PILLARS[pillarKey].criteria.forEach(c=>{ total += criterionPoints(state,c.k,c.max); });
  return Math.round(total*10)/10;
}
function pillarFillRatio(state, pillarKey){
  const pillar = PILLARS[pillarKey];
  const filled = pillar.criteria.filter(c=>state.scores[c.k] && state.scores[c.k]!=='unknown').length;
  return filled/pillar.criteria.length;
}
function overallFillRatio(state){
  let total=0, filled=0;
  Object.keys(PILLARS).forEach(pk=>{
    PILLARS[pk].criteria.forEach(c=>{
      total++;
      if(state.scores[c.k] && state.scores[c.k]!=='unknown') filled++;
    });
  });
  return total? filled/total : 0;
}
function profileFillRatio(state){
  const total = PROFILE_FIELDS.length;
  let filled=0;
  PROFILE_FIELDS.forEach(f=>{
    const v = state.profile[f.k];
    if(Array.isArray(v)? v.length : (v!=null && String(v).trim()!=='')) filled++;
  });
  return filled/total;
}
function penaltyTotal(state){
  let total=0;
  Object.keys(state.penalties||{}).forEach(k=>{
    if(!state.penalties[k]) return;
    const def = PENALTIES.find(p=>p.k===k);
    if(!def) return;
    if(def.disqualifying){ total += def.min; return; }
    const sev = state.penaltySeverity[k] || 'max';
    let val;
    if(def.min===def.max) val = def.min;
    else { if(sev==='min') val = def.max; else if(sev==='mid') val = Math.round((def.min+def.max)/2); else val = def.min; }
    total += val;
  });
  return total;
}
function bonusTotal(state){
  const checked = Object.keys(state.bonuses||{}).filter(k=>state.bonuses[k]).length;
  if(checked<2) return 0;
  return Math.min(10, checked*2);
}
function isDisqualified(state){ return !!(state.penalties && state.penalties['legal_risk']); }

function computeAll(state){
  const skill = pillarScore(state,'skill');
  const scale = pillarScore(state,'scale');
  const will = pillarScore(state,'will');
  const fit = pillarScore(state,'fit');
  const base = skill+scale+will+fit;
  const bonus = bonusTotal(state);
  const penalty = penaltyTotal(state);
  let final = base + bonus + penalty;
  if(final<0) final=0;
  if(final>100) final=100;
  if(isDisqualified(state)) final = Math.min(final, 15);
  const fillRatio = overallFillRatio(state);
  let confidence = fillRatio>0.8?'high':(fillRatio>=0.5?'mid':'low');
  const provisional = fillRatio < 0.5;
  return {skill,scale,will,fit,base,bonus,penalty,final,fillRatio,confidence,provisional};
}

function classify(score){
  if(score>=85) return {cat:'Strategic Growth Partner', priority:'P1', tier:'Tier stratégique / Elite', verdict:'Invest Now'};
  if(score>=70) return {cat:'High-Potential Partner', priority:'P1 (conditionnel)', tier:'Tier avancé', verdict:'Activate with Conditions'};
  if(score>=55) return {cat:'Incubate and Validate', priority:'P2', tier:'Tier registré', verdict:'Incubate'};
  if(score>=40) return {cat:'Opportunistic / Referral Only', priority:'P3', tier:'Referral', verdict:'Referral Only'};
  return {cat:'Do Not Prioritize', priority:'Do not prioritize', tier:'—', verdict:'Do Not Prioritize'};
}

/* ============================== SVG WIDGETS ============================== */

function gaugeSVG(percent, color, size){
  size = size||150;
  const r = size/2 - 10;
  const c = 2*Math.PI*r;
  const off = c*(1-percent/100);
  const cx = size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#2a2d35" stroke-width="9"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cx})"/>
  </svg>`;
}

function radarSVG(vals, size){
  // vals: array of {label, ratio(0-1), color}
  size = size||260;
  const cx=size/2, cy=size/2, R=size/2-38;
  const n=vals.length;
  const angle=i=> (Math.PI*2*i/n) - Math.PI/2;
  const pt=(i,r)=>[cx+Math.cos(angle(i))*r, cy+Math.sin(angle(i))*r];
  let grid='';
  [0.25,0.5,0.75,1].forEach(g=>{
    let p='';
    for(let i=0;i<n;i++){const [x,y]=pt(i,R*g);p+=`${x.toFixed(1)},${y.toFixed(1)} `;}
    grid+=`<polygon points="${p}" fill="none" stroke="#2a2d35" stroke-width="1"/>`;
  });
  let axes='',labels='';
  for(let i=0;i<n;i++){
    const [x,y]=pt(i,R);
    axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2d35" stroke-width="1"/>`;
    const [lx,ly]=pt(i,R+20);
    const anchor = Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');
    labels+=`<text x="${lx}" y="${ly+4}" fill="#8e8fa0" font-size="11" text-anchor="${anchor}">${vals[i].label}</text>`;
  }
  let poly='';
  for(let i=0;i<n;i++){const [x,y]=pt(i,R*Math.max(0.02,vals[i].ratio));poly+=`${x.toFixed(1)},${y.toFixed(1)} `;}
  let dots='';
  for(let i=0;i<n;i++){const [x,y]=pt(i,R*Math.max(0.02,vals[i].ratio));dots+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${vals[i].color}"/>`;}
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${grid}${axes}
    <polygon points="${poly}" fill="rgba(244,104,0,.18)" stroke="#f46800" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

function sparklineSVG(points, w, h, color){
  w=w||90; h=h||24; color=color||'#f46800';
  if(!points || points.length<2) return `<span style="color:var(--muted-dim);font-size:11px">1 version</span>`;
  const vals = points.map(p=>p.final);
  const min=Math.min(...vals,0), max=Math.max(...vals,100);
  const rng = (max-min)||1;
  const step = w/(points.length-1);
  const y = v => h-2 - ((v-min)/rng)*(h-4);
  let d='';
  points.forEach((p,i)=>{ d += (i?'L':'M')+(i*step).toFixed(1)+','+y(p.final).toFixed(1)+' '; });
  const last = points[points.length-1], lx=(points.length-1)*step, ly=y(last.final);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.4" fill="${color}"/>
  </svg>`;
}

function radarMultiSVG(axes, series, size){
  size = size||300;
  const cx=size/2, cy=size/2, R=size/2-42, n=axes.length;
  const angle=i=> (Math.PI*2*i/n) - Math.PI/2;
  const pt=(i,r)=>[cx+Math.cos(angle(i))*r, cy+Math.sin(angle(i))*r];
  let grid='';
  [0.25,0.5,0.75,1].forEach(g=>{ let p=''; for(let i=0;i<n;i++){const[x,y]=pt(i,R*g);p+=`${x.toFixed(1)},${y.toFixed(1)} `;} grid+=`<polygon points="${p}" fill="none" stroke="#2a2d35" stroke-width="1"/>`; });
  let ax='',labels='';
  for(let i=0;i<n;i++){ const[x,y]=pt(i,R); ax+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2d35" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+22); const anchor=Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');
    labels+=`<text x="${lx}" y="${ly+4}" fill="#8e8fa0" font-size="11" text-anchor="${anchor}">${axes[i]}</text>`; }
  let polys='';
  series.forEach(s=>{ let poly=''; for(let i=0;i<n;i++){const[x,y]=pt(i,R*Math.max(0.02,s.ratios[i]));poly+=`${x.toFixed(1)},${y.toFixed(1)} `;}
    polys+=`<polygon points="${poly}" fill="${s.color}22" stroke="${s.color}" stroke-width="2"/>`; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${grid}${ax}${polys}${labels}</svg>`;
}

function renderProfile(){
  const pf = Math.round(profileFillRatio(state)*100);
  let html = `<div class="card"><h2><span class="accent"></span>Profil du partenaire</h2>
  <p class="hint">24 champs structurants. Les champs vides sont signalés comme information manquante et diminuent le score de confiance. Les champs <span style="color:var(--yellow)">clés</span> pèsent sur la décision.</p>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="bar" style="flex:1"><i style="width:${pf}%"></i></div><span style="font-size:12px;color:var(--muted)">${pf}% complété</span></div>
  <div class="grid">`;
  PROFILE_FIELDS.forEach(f=>{
    const val = state.profile[f.k]||'';
    const empty = Array.isArray(val)? !val.length : String(val).trim()==='';
    html += `<div class="field ${f.req&&empty?'missing':''}" style="${f.t==='textarea'?'grid-column:1/-1':''}"><label>${f.l}${f.req?'<span class="req-tag">clé</span>':''}</label>`;
    if(f.t==='textarea'){
      html += `<textarea data-k="${f.k}" onchange="onProfileChange(event)">${escapeHtml(val)}</textarea>`;
    } else if(f.t==='select'){
      html += `<select data-k="${f.k}" onchange="onProfileChange(event)"><option value="">—</option>${f.opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
    } else if(f.t==='checklist'){
      const arr = Array.isArray(val)?val:[];
      html += `<div>${f.opts.map(o=>`<label style="display:inline-flex;align-items:center;gap:5px;margin:0 12px 8px 0;font-size:12px;color:var(--text)"><input type="checkbox" data-k="${f.k}" value="${o}" ${arr.includes(o)?'checked':''} onchange="onChecklistChange(event)"> ${o}</label>`).join('')}</div>`;
    } else {
      html += `<input type="${f.t}" data-k="${f.k}" value="${escapeHtml(val)}" onchange="onProfileChange(event)">`;
    }
    html += `</div>`;
  });
  html += `</div></div>
  <div class="card"><div class="navbtns"><button class="btn" onclick="goTo('assessment')">Continuer vers l'évaluation →</button></div></div>`;
  document.getElementById('main').innerHTML = html;
}

function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function onProfileChange(e){ state.profile[e.target.dataset.k] = e.target.value; saveState(); renderHeaderScore(); renderNav(); }
function onChecklistChange(e){
  const k = e.target.dataset.k;
  let arr = Array.isArray(state.profile[k])?state.profile[k]:[];
  if(e.target.checked) arr.push(e.target.value); else arr = arr.filter(v=>v!==e.target.value);
  state.profile[k]=arr; saveState();
}
function goTo(id){ currentScreen=id; render(); window.scrollTo({top:0}); }

function renderPillarCard(pillarKey){
  const pillar = PILLARS[pillarKey];
  const score = pillarScore(state,pillarKey);
  const pct = Math.round(score/pillar.max*100);
  let html = `<div class="card"><h2><span class="accent" style="background:${pillar.color}"></span>${pillar.label}
    <span style="color:var(--muted);font-weight:500;font-size:12px;margin-left:auto">${score}/${pillar.max} pts · poids ${pillar.weightPct}%</span></h2>
    <div class="bar" style="margin:8px 0 4px"><i style="width:${pct}%;background:${pillar.color}"></i></div>`;
  pillar.criteria.forEach(c=>{
    const isBinary = c.max===1;
    const levels = isBinary?LEVELS_BINARY:LEVELS;
    const cur = state.scores[c.k]||'unknown';
    const pts = criterionPoints(state,c.k,c.max);
    const note = (state.notes && state.notes[c.k]) || '';
    html += `<div class="criterion"><div class="top"><span class="name">${c.l}</span>
      <span class="max">${cur!=='unknown'?`<span class="pts-live">${pts}</span> / `:''}${c.max} pts</span></div>
      <div class="levels">`;
    levels.forEach(lv=>{
      html += `<button class="${cur===lv.k?'sel lv-'+lv.k:''}" onclick="setScore('${c.k}','${lv.k}')">${lv.l}</button>`;
    });
    html += `</div>
      <div class="critnote"><span class="ic">preuve</span><input type="text" value="${escapeHtml(note)}" placeholder="Preuve, lien, certification, référence client…" class="${note?'filled':''}" oninput="setNote('${c.k}', this.value)"></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderAssessment(){
  let html = '';
  Object.keys(PILLARS).forEach(pk=> html += renderPillarCard(pk));

  html += `<div class="card"><h2><span class="accent" style="background:var(--red)"></span>Pénalités / Red Flags</h2>
  <p class="hint">Cochez uniquement les signaux confirmés par des faits. Score final jamais négatif ; le red flag « risque juridique » plafonne le score final à 15.</p>`;

  const suggestions = suggestPenalties(state);
  if(suggestions.length){
    html += `<div class="suggest"><div class="st"><span>Suggestions basées sur le profil (${suggestions.length})</span><button onclick="applyAllSuggestions()">Tout appliquer</button></div>
    ${suggestions.map(s=>`<div class="schip"><b>${PENALTIES.find(p=>p.k===s.key).l}</b><span class="why">${s.why}</span><button onclick="applySuggestion('${s.key}')">Cocher</button></div>`).join('')}</div>`;
  }

  PENALTIES.forEach(p=>{
    const checked = !!(state.penalties && state.penalties[p.k]);
    html += `<div class="checkrow"><input type="checkbox" ${checked?'checked':''} onchange="setPenalty('${p.k}', this.checked)">
      <div style="flex:1"><div class="lbl">${p.l} ${checked?`<span class="badge ${p.sev}" style="margin-left:6px">${sevText(p.sev)}</span>`:''}</div>
      <div class="pts">${p.min===p.max? p.min+' pts' : p.min+' à '+p.max+' pts'}${p.disqualifying?' · disqualifiant':''}</div>
      ${(checked && p.min!==p.max && !p.disqualifying) ? `<div class="rangewrap" style="margin-top:6px"><input type="range" min="0" max="2" step="1" value="${sevIndex(state.penaltySeverity[p.k])}" oninput="setPenaltySeverity('${p.k}', this.value)"><span>${sevLabel(state.penaltySeverity[p.k])} (${penaltyValueFor(p, state.penaltySeverity[p.k])})</span></div>` : ''}
      </div></div>`;
  });
  html += `</div>`;

  html += `<div class="card"><h2><span class="accent" style="background:var(--green)"></span>Bonus « Pépite »</h2>
  <p class="hint">Jusqu'à 10 points bonus, appliqués seulement si au moins deux signaux concrets sont cochés.</p>`;
  BONUS_SIGNALS.forEach((sig,i)=>{
    const k = 'b'+i;
    const checked = !!(state.bonuses && state.bonuses[k]);
    html += `<div class="checkrow"><input type="checkbox" ${checked?'checked':''} onchange="setBonus('${k}', this.checked)"><div class="lbl">${sig}</div></div>`;
  });
  const bt = bonusTotal(state);
  html += `<p class="hint" style="margin-top:10px">Bonus appliqué : <b style="color:var(--orange)">${bt} pts</b> (${Object.values(state.bonuses||{}).filter(Boolean).length} signaux cochés)</p></div>`;

  const c = computeAll(state);
  html += `<div class="card"><h2><span class="accent"></span>Score en direct</h2>
    <div class="pillbar">
      ${scorePill('Skill',c.skill,30,PILLARS.skill.color)}
      ${scorePill('Scale',c.scale,25,PILLARS.scale.color)}
      ${scorePill('Will',c.will,30,PILLARS.will.color)}
      ${scorePill('Strategic Fit',c.fit,15,PILLARS.fit.color)}
      <div class="pill"><div class="lab">Bonus</div><div class="val" style="color:var(--green)">${c.bonus>0?'+':''}${c.bonus}</div></div>
      <div class="pill"><div class="lab">Pénalités</div><div class="val" style="color:var(--red)">${c.penalty}</div></div>
    </div>
    <div class="navbtns"><button class="btn" onclick="goTo('decision')">Voir la décision →</button></div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function scorePill(lab,val,max,col){
  const pct=Math.round(val/max*100);
  return `<div class="pill"><div class="lab">${lab} /${max}</div><div class="val" style="color:${col}">${val}</div>
    <div class="bar" style="margin-top:6px"><i style="width:${pct}%;background:${col}"></i></div></div>`;
}
function sevIndex(sev){ return sev==='min'?0:(sev==='mid'?1:2); }
function sevLabel(sev){ return sev==='min'?'Faible':(sev==='mid'?'Moyen':'Fort'); }
function penaltyValueFor(def,sev){
  if(def.min===def.max) return def.min;
  if(sev==='min') return def.max;
  if(sev==='mid') return Math.round((def.min+def.max)/2);
  return def.min;
}
function setScore(key, level){ state.scores[key]=level; saveState(); renderAssessment(); renderHeaderScore(); renderNav(); }
function setPenalty(key, checked){
  state.penalties = state.penalties||{};
  state.penalties[key]=checked;
  if(checked && !state.penaltySeverity[key]) state.penaltySeverity[key]='max';
  saveState(); renderAssessment(); renderHeaderScore();
}
function setPenaltySeverity(key, idx){
  state.penaltySeverity = state.penaltySeverity||{};
  state.penaltySeverity[key] = idx=='0'?'min':(idx=='1'?'mid':'max');
  saveState(); renderAssessment(); renderHeaderScore();
}
function setBonus(key, checked){ state.bonuses = state.bonuses||{}; state.bonuses[key]=checked; saveState(); renderAssessment(); renderHeaderScore(); }
function setNote(key, val){ state.notes = state.notes||{}; if(val) state.notes[key]=val; else delete state.notes[key]; saveState(); }
function suggestPenalties(state){
  const p = state.profile||{}, out=[];
  const has = v => v!=null && String(v).trim()!=='';
  const named = [p.namedAccount1,p.namedAccount2,p.namedAccount3].filter(has);
  const comp = (Array.isArray(p.competitors)?p.competitors:[]).filter(x=>x!=='Open-source only' && x!=='Autres');
  const checked = k => state.penalties && state.penalties[k];
  const add = (k,why)=>{ if(!checked(k)) out.push({key:k,why}); };
  if(!has(p.execSponsor)) add('no_sponsor','Aucun sponsor exécutif renseigné dans le profil.');
  if(named.length===0) add('no_named_accounts','Aucun compte nommé renseigné dans le profil.');
  if(!has(p.peopleToTrain)) add('no_training','Nombre de personnes à certifier non renseigné.');
  if(comp.length>=4) add('too_many_competitors', comp.length+' vendors concurrents déclarés vendus.');
  if(!has(p.nextAction) && !has(p.actionSinceLast)) add('no_action_60d','Aucune action récente ni prochaine action renseignée.');
  if(!has(p.pipelineTarget) && !has(p.existingOpps)) add('no_pipeline_sharing','Ni objectif de pipeline ni opportunité renseignés.');
  if(!has(p.enterpriseAccess)) add('no_client_access','Aucun accès à des comptes Enterprise/Mid-Market renseigné.');
  return out;
}
function applySuggestion(key){ setPenalty(key,true); }
function applyAllSuggestions(){
  suggestPenalties(state).forEach(s=>{ state.penalties=state.penalties||{}; state.penalties[s.key]=true; if(!state.penaltySeverity[s.key]) state.penaltySeverity[s.key]='max'; });
  saveState(); renderAssessment(); renderHeaderScore();
}
function criterionLabel(key){
  for(const pk of Object.keys(PILLARS)){ const c=PILLARS[pk].criteria.find(x=>x.k===key); if(c) return {label:c.l, pillar:PILLARS[pk].label}; }
  return {label:key, pillar:''};
}
function notesList(state){
  return Object.keys(state.notes||{}).filter(k=>state.notes[k]).map(k=>({key:k, note:state.notes[k], ...criterionLabel(k)}));
}

/* ============================== SCREEN 3 - DECISION ============================== */

function pillarArr(c){
  return [
    {k:'Skill', v:c.skill, max:30, color:PILLARS.skill.color},
    {k:'Scale', v:c.scale, max:25, color:PILLARS.scale.color},
    {k:'Will', v:c.will, max:30, color:PILLARS.will.color},
    {k:'Strategic Fit', v:c.fit, max:15, color:PILLARS.fit.color},
  ];
}
function weakestPillar(c){ return pillarArr(c).slice().sort((a,b)=>(a.v/a.max)-(b.v/b.max))[0]; }
function strongestPillar(c){ return pillarArr(c).slice().sort((a,b)=>(b.v/b.max)-(a.v/a.max))[0]; }
function activePenalties(){ return PENALTIES.filter(p=> state.penalties && state.penalties[p.k]); }

function renderDecision(){
  const c = computeAll(state);

  const pName = state.profile.partnerName || '(nom non renseigné)';

  const col = catColor(cls.cat);

  let html = `<div class="card"><h2><span class="accent"></span>Vue d'ensemble</h2>
    <div class="scorehero">
      <div class="gauge">${gaugeSVG(c.final,col,150)}<div class="center"><div class="n" style="color:${col}">${c.final.toFixed(0)}</div><div class="d">/100</div></div></div>
      <div style="flex:1;min-width:200px">
        <div class="catbadge" style="background:${col};color:#0d0d0f">${cls.cat}</div>${c.provisional?' <span class="prov-tag">score provisoire</span>':''}

        <div style="margin-top:8px"><span class="conf ${c.confidence}">${confLabel(c.confidence)} — ${Math.round(c.fillRatio*100)}% des critères renseignés</span></div>
        ${c.provisional?`<div class="prov-note">Score provisoire : moins de 50 % des critères sont renseignés. À traiter comme une hypothèse de travail, pas comme une décision ferme, tant que l'évaluation n'est pas complétée.</div>`:''}
      </div>
      <div class="radar-wrap">${radarSVG(radarVals,240)}</div>
    </div>
  </div>`;

  html += `<div class="card exec"><h2><span class="accent"></span>1. Executive Summary</h2><p>
  <b>${pName}</b> (${pType}${state.profile.country? ', '+state.profile.country:''}) obtient <b>${c.final.toFixed(0)}/100</b>, dans la catégorie <b>${cls.cat}</b>.
  Point fort principal : <b>${strong.k}</b> (${strong.v}/${strong.max}). Point le plus faible : <b>${weak.k}</b> (${weak.v}/${weak.max}) — première zone à faire progresser ou à challenger en meeting.
  ${activePenalties().length? `${activePenalties().length} red flag${activePenalties().length>1?'s':''} identifié${activePenalties().length>1?'s':''}, à clarifier avant tout investissement.` : `Aucun red flag coché — à confirmer par les faits, pas les déclarations.`}
  Décision : <b>${cls.verdict}</b>.
  </p></div>`;

  html += `<div class="card"><h2><span class="accent"></span>2. Scorecard</h2>
  <table><thead><tr><th>Dimension</th><th>Score</th><th>Max</th><th>Progression</th><th>Niveau de preuve</th></tr></thead><tbody>
  ${scorecardRow('Skill', c.skill, 30, 'skill')}
  ${scorecardRow('Scale', c.scale, 25, 'scale')}
  ${scorecardRow('Will', c.will, 30, 'will')}
  ${scorecardRow('Strategic Fit', c.fit, 15, 'fit')}
  <tr><td>Bonus Pépite</td><td colspan="2">${c.bonus>0?'+':''}${c.bonus}</td><td></td><td>${Object.values(state.bonuses||{}).filter(Boolean).length} signaux</td></tr>
  <tr><td>Pénalités</td><td colspan="2" style="color:var(--red)">${c.penalty}</td><td></td><td>${activePenalties().length} red flag(s)</td></tr>
  <tr style="font-weight:800"><td>Score final</td><td colspan="2" style="color:${col}">${c.final.toFixed(0)} / 100</td><td></td><td>—</td></tr>
  </tbody></table></div>`;

  html += `<div class="card"><h2><span class="accent"></span>3. Classification</h2>
    <table>
      <tr><td>Niveau de priorité</td><td><b>${cls.priority}</b></td></tr>
      <tr><td>Modèle de partenariat recommandé</td><td>${recommendedModel(state,c)}</td></tr>
      <tr><td>Tier potentiel</td><td>${cls.tier}</td></tr>
      <tr><td>Horizon de génération de pipeline</td><td>${pipelineHorizon(cls.cat)}</td></tr>
      <tr><td>Score de confiance</td><td><span class="conf ${c.confidence}">${confLabel(c.confidence)} (${Math.round(c.fillRatio*100)}%)</span></td></tr>
    </table>
  </div>`;

  html += renderOpportunities(state,c);
  html += renderRisks(state,c);
  html += renderJustifications(state);

  html += `<div class="card"><div class="navbtns">
    <button class="btn" onclick="saveToPortfolio()">Enregistrer dans le portfolio</button>

function confLabel(c){ return c==='high'?'Haute confiance':(c==='mid'?'Confiance moyenne':'Faible confiance'); }
function catColor(cat){
  if(cat==='Strategic Growth Partner') return 'var(--green)';
  if(cat==='High-Potential Partner') return '#8fd6b0';
  if(cat==='Incubate and Validate') return 'var(--yellow)';
  if(cat==='Opportunistic / Referral Only') return '#f0a13c';
  return 'var(--red)';
}
function scorecardRow(label,val,max,pk){
  const ratio = pillarFillRatio(state,pk);
  const lvl = ratio>0.8?'Confirmé':(ratio>=0.4?'Déclaré':'Hypothèse / info manquante');
  const pct=Math.round(val/max*100);
  return `<tr><td>${label}</td><td>${val}</td><td>${max}</td><td><div class="bar" style="width:90px"><i style="width:${pct}%;background:${PILLARS[pk].color}"></i></div></td><td>${lvl}</td></tr>`;
}
function recommendedModel(state,c){
  const motion = state.profile.dominantMotion;
  if(c.final>=70) return motion? `${motion} avec co-investissement Grafana (enablement, MDF, deal registration prioritaire)` : 'Partenariat investi (co-sell / resale) — motion à confirmer';
  if(c.final>=55) return 'Partenariat testé sur un périmètre limité (workshop / campagne pilote)';
  if(c.final>=40) return 'Referral uniquement, support réactif';
  return 'Relation légère, sans investissement Channel';
}
function pipelineHorizon(cat){
  if(cat==='Strategic Growth Partner') return '0–6 mois';

  if(cat==='Incubate and Validate') return '9–12 mois, à revalider';
  if(cat==='Opportunistic / Referral Only') return 'Opportuniste, non planifiable';
  return 'Non pertinent en l\'état';
}

function renderRisks(state,c){

function saveToPortfolio(){
  const c = computeAll(state);
  const cls = classify(c.final);
  let list = loadPortfolio();
  const id = state.profile.partnerName ? state.profile.partnerName.toLowerCase().trim() : ('partner_'+Date.now());
  const now = new Date().toISOString();
  const idx = list.findIndex(p=>p.id===id);
  // Carry over history from any previous save of the same partner.
  const prevHistory = (idx>=0 && Array.isArray(list[idx].history)) ? list[idx].history : [];
  const history = prevHistory.concat([{at:now, final:c.final, skill:c.skill, scale:c.scale, will:c.will, fit:c.fit}]).slice(-24);
  // Store FULL snapshot so it can be fully restored later.
  const entry = {
    id,
    profile:{...state.profile},
    scores:{...state.scores},
    notes:{...state.notes},
    penalties:{...state.penalties},
    penaltySeverity:{...state.penaltySeverity},
    bonuses:{...state.bonuses},
    computed:{...c},
    category:cls.cat, verdict:cls.verdict,
    history,
    savedAt:now
  };
  if(idx>=0) list[idx]=entry; else list.push(entry);
  savePortfolio(list);
  const delta = prevHistory.length ? (c.final - prevHistory[prevHistory.length-1].final) : 0;
  alert(`Partenaire enregistré (v${history.length}).`+(prevHistory.length?` Évolution du score : ${delta>=0?'+':''}${delta.toFixed(0)} pt depuis la dernière sauvegarde.`:' Évaluation complète archivée et rechargeable.'));
  render();
}

function buildMeetingMarkdown(state){
  const c = computeAll(state);
  const cls = classify(c.final);
  const pName = state.profile.partnerName || 'Partenaire';
  const weak = weakestPillar(c), strong = strongestPillar(c);
  const named = [state.profile.namedAccount1,state.profile.namedAccount2,state.profile.namedAccount3].filter(Boolean);
  const L = [];
  L.push(`# Brief meeting — ${pName}`);
  L.push('');
  L.push(`- **Score** : ${c.final.toFixed(0)}/100${c.provisional?' (provisoire)':''} — ${cls.cat}`);
  L.push(`- **Décision recommandée** : ${cls.verdict}`);
  L.push(`- **Point fort** : ${strong.k} (${strong.v}/${strong.max}) · **Point faible** : ${weak.k} (${weak.v}/${weak.max})`);
  L.push(`- **Confiance** : ${confLabel(c.confidence)} (${Math.round(c.fillRatio*100)}%)`);
  L.push('');
  L.push('## Objectif du meeting');
  L.push(cls.cat==='Do Not Prioritize' ? 'Valider s\'il existe un deal concret qui justifie de poursuivre, sinon clore la relation.' : `Obtenir des preuves concrètes sur la dimension la plus faible (${weak.k}) et sécuriser un engagement daté.`);
  L.push('');
  L.push('## Interlocuteurs');
  L.push([state.profile.execSponsor,state.profile.salesChampion,state.profile.techChampion].filter(Boolean).join(', ') || 'Sponsor exécutif, champion commercial et champion technique — à identifier.');
  L.push('');
  L.push('## Comptes nommés');
  L.push(named.length? named.map(n=>`- ${n}`).join('\n') : '- Aucun compte nommé communiqué.');
  L.push('');
  L.push('## Offre Grafana à positionner');
  L.push(offerToPosition(state));
  L.push('');
  L.push('## 10 questions à poser');
  QUESTION_BANK.forEach((q,i)=> L.push(`${i+1}. ${q.q(state)}`));
  L.push('');
  L.push('## Objections probables');
  likelyObjections(state).forEach(o=> L.push(`- ${o}`));
  const active = activePenalties();
  if(active.length){
    L.push('');
    L.push('## Red flags à clarifier');
    active.forEach(p=> L.push(`- **${p.l}** — ${riskQuestion(p.k)}`));
  }
  L.push('');
  L.push('## Engagement à obtenir');
  L.push('Date précise pour la prochaine action, et si possible un compte nommé qualifié.');
  return L.join('\n');
}
function copyMeetingMarkdown(){
  const md = buildMeetingMarkdown(state);
  const done = ()=>{ const el=document.getElementById('mdCopyMsg'); if(el){el.textContent='Copié ✓';setTimeout(()=>el.textContent='',2000);} };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(done).catch(()=>fallbackCopy(md,done)); }
  else fallbackCopy(md, done);
}
function fallbackCopy(text, done){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done&&done(); }catch(e){ alert('Copie impossible — utilisez « Télécharger .md ».'); }
  document.body.removeChild(ta);
}
function downloadMeetingMarkdown(){
  const md = buildMeetingMarkdown(state);
  const blob = new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const name=(state.profile.partnerName||'partner').toLowerCase().replace(/[^a-z0-9]+/g,'-');
  a.download=`brief-meeting-${name}.md`; a.click(); URL.revokeObjectURL(a.href);
}
function offerToPosition(state){
  const motion = state.profile.dominantMotion;
  if(motion==='Managed services') return 'Offre de managed observability packagée autour de Grafana Cloud (LGTM stack).';
  if(motion==='Resale') return 'Grafana Cloud en revente avec marge, appuyé par du deal registration.';
  if(motion==='Referral') return 'Programme referral avec commission sur closing par les équipes Grafana.';
  if(motion==='Co-sell') return 'Motion co-sell conjointe sur comptes Enterprise partagés.';
  return 'Grafana Cloud / LGTM stack comme alternative ouverte aux plateformes propriétaires (Datadog, Splunk, Dynatrace).';
}
function likelyObjections(state){
  const comp = Array.isArray(state.profile.competitors)?state.profile.competitors:[];
  const objs = [];
  if(comp.length && !comp.includes('Open-source only')) objs.push(`« Nous avons déjà des revenus établis sur ${comp[0]}, pourquoi ajouter Grafana ? » → Positionner la complémentarité et les cas de migration/coexistence, pas un remplacement forcé.`);
  objs.push('« Nous n\'avons pas encore de compétence Grafana en interne » → Proposer un plan d\'enablement daté avec objectif de certification.');
  objs.push('« Nous voulons voir du pipeline avant d\'investir » → Proposer un pilote limité (1 workshop, 1 compte) avant tout engagement plus large.');
  return objs;
}

      ]},
      {title:'31 à 60 jours', items:[

        {action:'Aligner Sales et Solutions Engineering sur les comptes prioritaires', owner:'Channel Manager', due:'J+60', result:'Plan de compte partagé sur 3+ comptes'},

        {action:'Revue de gouvernance trimestrielle avec sponsor exécutif', owner:'Channel Manager + Sponsor', due:'J+90', result:'Objectif de pipeline 12 mois confirmé ou ajusté'},
        {action:'Lancer une action marketing conjointe (webinar, campagne)', owner:'Marketing + Partner', due:'J+90', result:'1 action marketing exécutée, leads générés'},
        {action:'Décider du tier définitif dans le Partner Program', owner:'Channel Manager', due:'J+90', result:'Tier confirmé avec engagements mesurables'},

  if(cls.cat==='Incubate and Validate'){
    return [
      {title:'0 à 30 jours', items:[

        {action:'Demander 3 comptes nommés et un engagement de formation minimal', owner:'Partner', due:'J+30', result:'Comptes nommés + date de certification'},
      ]},
      {title:'31 à 60 jours', items:[

      ]},

  }
  return [

function buildConditions(state,c){
  const conditions = [];
  const named = [state.profile.namedAccount1,state.profile.namedAccount2,state.profile.namedAccount3].filter(Boolean);
  if(named.length<3) conditions.push(`Trois comptes nommés qualifiés (actuellement ${named.length}/3 communiqués)`);
  if(!state.profile.execSponsor) conditions.push('Un sponsor exécutif présent à la prochaine revue trimestrielle');
  conditions.push(`${state.profile.peopleToTrain||'Deux'} personnes inscrites et engagées dans l'enablement Grafana`);
  if(conditions.length<3) conditions.push('Un workshop client planifié avec une date confirmée');
  if(conditions.length<3) conditions.push('Une opportunité enregistrée (deal registration) avec le programme partenaire');
  return conditions.slice(0,3);
}
function verdictJustification(state,c,cls){
  const pName = state.profile.partnerName || 'Ce partenaire';
  const weak = weakestPillar(c);
  return `${pName} obtient ${c.final.toFixed(0)}/100, avec ${strongestPillar(c).k} comme point d'appui principal et ${weak.k} comme frein le plus important. `+
  `${activePenalties().length? 'Des red flags actifs ('+activePenalties().length+') renforcent la prudence recommandée.' : 'Aucun red flag n\'est actif à ce stade, mais la confiance reste ' + confLabel(c.confidence).toLowerCase() + '.'} `+
  `La recommandation « ${cls.verdict} » reflète un équilibre entre le potentiel démontré et le niveau de preuve disponible aujourd'hui.`;
}
function nextDecision(cls){
  if(cls.verdict==='Invest Now') return 'Allouer un budget Channel dédié et nommer un owner interne unique.';
  if(cls.verdict==='Activate with Conditions') return 'Conditionner tout investissement additionnel à l\'obtention des preuves listées en section 9.';
  if(cls.verdict==='Incubate') return 'Lancer le test à échelle réduite avant toute décision de tier.';
  if(cls.verdict==='Referral Only') return 'Documenter le statut referral et ne pas allouer de ressources Channel dédiées.';
  return 'Ne pas poursuivre sauf apparition d\'un deal concret et qualifié.';
}
function reevalDate(cls){
  const days = cls.verdict==='Invest Now'?90:(cls.verdict==='Activate with Conditions'?90:(cls.verdict==='Incubate'?60:30));
  const d = new Date(); d.setDate(d.getDate()+days);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}) + ` (dans ${days} jours)`;
}

  <table><thead><tr><th>Partenaire</th><th>Type</th><th>Score</th><th>Tendance</th><th>Catégorie</th><th>Enregistré</th><th></th></tr></thead><tbody>
  ${list.slice().sort((a,b)=>((b.computed||b.scores).final||0)-((a.computed||a.scores).final||0)).map(p=>{

  </tr>`;}).join('')}
  </tbody></table></div>`;

  document.getElementById('main').innerHTML = html;

function renderCompareCard(list){
  compareSel = compareSel.filter(id=>list.some(p=>p.id===id));
  const axes = ['Skill','Scale','Will','Fit'];
  const maxes = {Skill:30,Scale:25,Will:30,Fit:15};
  const selected = compareSel.map(id=>list.find(p=>p.id===id)).filter(Boolean).slice(0,3);
  const series = selected.map((p,i)=>{ const cc=p.computed||p.scores; return {
    name:p.profile.partnerName||'?', color:COMPARE_COLORS[i%3],
    ratios:[(cc.skill||0)/maxes.Skill,(cc.scale||0)/maxes.Scale,(cc.will||0)/maxes.Will,(cc.fit||0)/maxes.Fit]
  };});
  let html = `<div class="card"><h2><span class="accent"></span>Comparaison (radar)</h2>
  <p class="hint">Sélectionnez jusqu'à 3 partenaires pour superposer leurs profils Skill / Scale / Will / Fit.</p>
  <div class="cmp-toolbar">${list.map(p=>{
    const on = compareSel.includes(p.id);
    const dis = !on && compareSel.length>=3;
    return `<label style="${dis?'opacity:.4;cursor:not-allowed':''}"><input type="checkbox" ${on?'checked':''} ${dis?'disabled':''} onchange="toggleCompare('${p.id}')"> ${escapeHtml(p.profile.partnerName||'?')}</label>`;
  }).join('')}</div>`;
  if(series.length){
    html += `<div style="display:flex;justify-content:center">${radarMultiSVG(axes, series, 320)}</div>
    <div class="cmp-legend">${series.map(s=>`<div class="row"><span class="sw" style="background:${s.color}"></span>${escapeHtml(s.name)}</div>`).join('')}</div>`;
  } else {
    html += `<div class="empty">Cochez au moins un partenaire pour afficher le radar.</div>`;
  }
  html += `</div>`;
  return html;
}
function toggleCompare(id){
  const i = compareSel.indexOf(id);
  if(i>=0) compareSel.splice(i,1);
  else { if(compareSel.length>=3) return; compareSel.push(id); }
  renderPortfolio();
}
function catColorHex(cat){
  if(cat==='Strategic Growth Partner') return '#3cbf7a';
  if(cat==='High-Potential Partner') return '#8fd6b0';
  if(cat==='Incubate and Validate') return '#e0b23c';
  if(cat==='Opportunistic / Referral Only') return '#f0a13c';
  return '#e35b5b';
}
function loadFromPortfolio(id){
  const list = loadPortfolio();
  const entry = list.find(p=>p.id===id);
  if(!entry) return;
  if(!confirm('Charger ce partenaire remplacera l\'évaluation en cours. Continuer ?')) return;
  // Full restore now that the snapshot stores everything.
  state = Object.assign(freshState(), {
    profile:{...entry.profile},
    scores:{...(entry.scores||{})},
    notes:{...(entry.notes||{})},
    penalties:{...(entry.penalties||{})},
    penaltySeverity:{...(entry.penaltySeverity||{})},
    bonuses:{...(entry.bonuses||{})},
    meta:{savedAt:entry.savedAt}
  });
  saveState();
  currentScreen='decision';
  render(); window.scrollTo({top:0});
}
function deleteFromPortfolio(id){
  if(!confirm('Supprimer ce partenaire du portfolio ?')) return;
  let list = loadPortfolio().filter(p=>p.id!==id);
  savePortfolio(list); render();
}
function exportPortfolioCSV(){
  const list = loadPortfolio();
  const rows = [['Partenaire','Type','Pays','Score','Skill','Scale','Will','Fit','Categorie','Verdict','Enregistre']];
  list.forEach(p=>{ const cc=p.computed||p.scores;
    rows.push([p.profile.partnerName||'',p.profile.partnerType||'',p.profile.country||'',
      (cc.final||0).toFixed(0),cc.skill||'',cc.scale||'',cc.will||'',cc.fit||'',p.category||'',p.verdict||'',
      new Date(p.savedAt).toLocaleDateString('fr-FR')]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gpae-portfolio.csv'; a.click(); URL.revokeObjectURL(a.href);
}

  if(currentScreen==='profile') renderProfile();
  else if(currentScreen==='assessment') renderAssessment();
  else if(currentScreen==='decision') renderDecision();
  else if(currentScreen==='meeting') renderMeeting();
  else if(currentScreen==='plan') renderPlan();
  else if(currentScreen==='portfolio') renderPortfolio();
}

render();
</script>
